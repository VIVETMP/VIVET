<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    
    <!-- Tipografía Apple-Styled (Inter para imitar SF Pro Display en todas las plataformas) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-1: #ffffff;
            --accent-2: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.2);
            --bg-dark: #000000;
            --apple-ease: cubic-bezier(0.4, 0, 0.2, 1);
            --apple-spring: cubic-bezier(0.25, 1, 0.4, 1);
            transition: --accent-1 1s ease, --accent-2 1s ease;
        }

        /* RESET & OPTIMIZACIÓN */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
            text-rendering: optimizeLegibility;
        }

        body { 
            height: 100vh; width: 100vw; 
            background-color: var(--bg-dark); 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; position: relative; padding: 40px;
        }

        /* FONDO DE VIDEO & OVERLAY */
        .video-background, .image-fallback { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; opacity: 0; 
            transition: opacity 2.5s var(--apple-ease); 
            will-change: opacity; 
        }
        .video-background.active, .image-fallback.active { opacity: 1; z-index: 2; }
        .image-fallback { filter: blur(60px) brightness(0.6); transform: scale(1.05); }
        
        .overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%); 
            backdrop-filter: blur(8px) saturate(1.2); 
            -webkit-backdrop-filter: blur(8px) saturate(1.2);
            z-index: 3; pointer-events: none; 
        }

        /* ISLA REPRODUCTOR GLASSMORPHIC PREMIUM */
        .player-app { 
            position: relative; z-index: 10; 
            width: 520px; 
            height: 160px; 
            background: rgba(30, 30, 35, 0.45); 
            backdrop-filter: blur(40px) saturate(1.8); 
            -webkit-backdrop-filter: blur(40px) saturate(1.8);
            border-radius: 36px;
            padding: 20px 24px; 
            display: flex; flex-direction: row; 
            align-items: center; gap: 20px; 
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); 
            transform: translateZ(0);
            
            animation: slideUpPlayer 2.5s var(--apple-ease) forwards;
        }

        /* LYRICS - ESTILO APPLE MUSIC */
        .lyrics-overlay { 
            position: absolute; 
            bottom: calc(100% + 24px); left: 0; right: 0; 
            height: 220px; z-index: 100; 
            background: rgba(20, 20, 22, 0.65);
            backdrop-filter: blur(50px) saturate(2);
            -webkit-backdrop-filter: blur(50px) saturate(2);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            opacity: 0; pointer-events: none; 
            
            transform: translateY(20px) scale(0.98);
            transition: opacity 0.6s var(--apple-ease), transform 0.6s var(--apple-ease);
            
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            will-change: opacity, transform; 
        }
        
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
        .lyrics-content { width: 100%; height: 100%; overflow-y: auto; padding: 24px 30px; scrollbar-width: none; overscroll-behavior: contain; }
        
        .lyric-line { 
            font-size: 20px; font-weight: 700; margin: 16px 0; text-align: left; 
            color: rgba(255,255,255,0.3); 
            letter-spacing: -0.5px; line-height: 1.3; 
            transform-origin: left center;
            filter: blur(1.5px);
            transition: all 0.6s var(--apple-ease); 
        }
        .lyric-line.active { 
            color: #ffffff; 
            font-size: 24px;
            transform: scale(1.02); 
            filter: blur(0px);
            text-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        /* PORTADA NÍTIDA Y ESTÁTICA */
        #artwork-wrapper { 
            width: 120px; height: 120px; flex-shrink: 0; margin: 0;
            transform: none !important; /* Deshabilita el beat-scale del JS */
        }
        .artwork-container { 
            width: 100%; height: 100%; border-radius: 20px; overflow: hidden; 
            border: 0.5px solid rgba(255,255,255,0.1);
            transform: none !important; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: opacity 0.4s var(--apple-ease), filter 0.8s var(--apple-ease);
        }
        body.player-paused .artwork-container { filter: brightness(0.7); }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTENEDOR DE CONTROLES */
        .controls-wrapper { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: space-between; height: 120px; min-width: 0;
        }
        
        /* HEADER VIVET & ECUALIZADOR */
        .header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 8px; }
        .brand-container {
            display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 700; letter-spacing: 3px; 
            color: rgba(255,255,255,0.6);
        }
        .site-logo { 
            width: 12px; height: 12px; background-color: rgba(255,255,255,0.8); 
            -webkit-mask: url('covers/LOGO.png') no-repeat center/contain; mask: url('covers/LOGO.png') no-repeat center/contain; 
        }
        .eq-container { display: flex; align-items: flex-end; gap: 3px; height: 12px; }
        .eq-bar { 
            width: 3px; background: var(--accent-1); border-radius: 2px; 
            filter: saturate(1.5) brightness(1.2);
            transition: height 0.3s ease; 
        }
        body:not(.player-paused) .eq-bar { animation: eqBounce 0.8s alternate ease-in-out infinite; }
        body:not(.player-paused) .eq-bar:nth-child(2) { animation-delay: 0.2s; animation-duration: 0.6s; }
        body:not(.player-paused) .eq-bar:nth-child(3) { animation-delay: 0.4s; animation-duration: 0.7s; }
        @keyframes eqBounce { 0% { height: 4px; } 100% { height: 12px; } }

        /* TRACK INFO */
        .track-info { display: flex; justify-content: space-between; align-items: center; gap: 10px; width: 100%; height: auto; margin-bottom: 8px; }
        .track-title { font-size: 18px; font-weight: 700; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.3px; line-height: 1.2; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .track-artist { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55); margin-top: 2px; line-height: 1.2; }

        /* PROGRESO COLOR DINÁMICO VIBRANTE */
        .progress-area { width: 100%; display: flex; flex-direction: column; justify-content: center; margin-bottom: 6px; }
        .progress-bar { 
            -webkit-appearance: none; appearance: none; 
            width: 100%; height: 6px; border-radius: 3px;
            background-color: rgba(255,255,255,0.1); outline: none; margin: 0;
            background-image: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
            cursor: pointer;
            filter: saturate(1.5) brightness(1.2);
            transition: height 0.2s var(--apple-ease); 
        }
        .progress-bar:hover, .progress-bar:active { height: 8px; }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 0; height: 0; }
        .progress-bar::-moz-range-thumb { width: 0; height: 0; border: none; background: transparent; }

        .time-info { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 0.5px; }

        /* BOTONES APPLE MUSIC STYLE */
        .controls { 
            display: flex; align-items: center; justify-content: center; 
            gap: 22px; width: 100%; height: 44px; margin-top: auto;
        }
        .btn { 
            background: none!important; border: none!important; cursor: pointer; 
            color: rgba(255,255,255,0.7); display: flex; align-items: center; justify-content: center; padding: 0; 
            touch-action: manipulation; 
            transition: transform 0.3s var(--apple-ease), color 0.3s ease, opacity 0.3s ease;
        }
        .btn:hover { color: #fff; transform: scale(1.05); } 
        .btn:active { transform: scale(0.95) !important; opacity: 0.6; } 
        .btn svg { width: 20px; height: 20px; fill: currentColor; }
        
        .btn-play { 
            width: 44px; height: 44px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2))!important; 
            color: #000!important; box-shadow: 0 8px 20px var(--accent-glow); 
            filter: saturate(1.5) brightness(1.1);
        }
        /* Corrección óptica del ícono de play para que se vea centrado */
        .btn-play svg { width: 22px; height: 22px; fill: #000!important; margin-left: 2px; }
        #icon-pause { margin-left: 0; }
        
        .btn-secondary { opacity: 0.6; }
        .btn-secondary.active { opacity: 1; color: var(--accent-1); filter: saturate(1.5) brightness(1.2); }

        /* MIXING BADGE */
        .mixing-badge { 
            position: absolute; top: -14px; left: 50%; transform: translateX(-50%) scale(0.9); 
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); color: #000; 
            padding: 4px 14px; border-radius: 20px; 
            font-size: 9px; font-weight: 800; opacity: 0; letter-spacing: 1px;
            transition: all 0.6s var(--apple-ease);
            box-shadow: 0 6px 15px var(--accent-glow); z-index: 20;
            filter: saturate(1.5);
        }
        .mixing-badge.active { opacity: 1; transform: translateX(-50%) scale(1); }

        /* CROSSFADE VISUAL ORGÁNICO (12 Segundos) - Reacciona al Badge Active sin tocar JS */
        .player-app:has(.mixing-badge.active) #artwork-wrapper .artwork-container,
        .player-app:has(.mixing-badge.active) .track-info {
            animation: organicCrossfade 12s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes organicCrossfade {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); filter: blur(5px); }
            10% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
        }

        /* SPLASH SCREEN CINEMATOGRÁFICO MAJESTUOSO */
        .splash-screen {
            position: fixed; inset: 0; background-color: #000000; z-index: 999999;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(40px);
            animation: fadeOutSplash 3s cubic-bezier(0.8, 0, 0.1, 1) forwards; pointer-events: none; 
        }
        .splash-logo {
            width: 140px; height: 140px; background-color: #ffffff; 
            -webkit-mask: url('covers/LOGO.png') no-repeat center/contain; mask: url('covers/LOGO.png') no-repeat center/contain;
            animation: majesticReveal 2.5s cubic-bezier(0.8, 0, 0.1, 1) forwards;
        }

        @keyframes majesticReveal {
            0% { transform: scale(0.7) translateY(20px); opacity: 0; filter: blur(15px); }
            25% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0px) drop-shadow(0 0 25px rgba(255,255,255,0.5)); }
            75% { transform: scale(1.05); opacity: 1; filter: blur(0px) drop-shadow(0 0 35px rgba(255,255,255,0.7)); }
            100% { transform: scale(1.6) translateY(-20px); opacity: 0; filter: blur(20px); }
        }
        @keyframes fadeOutSplash {
            0%, 75% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes slideUpPlayer {
            0% { transform: translateY(80px) scale(0.95); opacity: 0; }
            60% { transform: translateY(80px) scale(0.95); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
    </style>
</head>

    <!-- SCRIPT ORIGINAL (INTACTO COMO SOLICITADO) -->
    <script>
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },

            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" },
            { title: "GANAS", artist: "KRIS R", cover: "covers/GANAS.jpg", file: "songs/GANAS.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774550862/GANAS_h8pqaj.mp4" },
            { title: "ETA RMX", artist: "ROA, DE LA ROSE, LUAR LA L, YAN BLOCK y OMAR COURTZ", cover: "covers/ETA REMIX.jpg", file: "songs/ETA REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774641439/ETA_REMIX_j5c5lh.mp4" }
        ];

        let currentIdx = 0, isPlaying = false, isDragging = false, isShuffle = false, isRepeat = false, isCrossfading = false;
        let fadeStartTime = 0, fadingOutAudio = null, fadingInAudio = null, activeLayer = 1;
        let currentLyrics =[], activeLyricIndex = -1, isLyricsVisible = false, lyricsRequestCount = 0;
        let colorCache = {}, audioCtx, analyser, dataArray;
        
        const CROSSFADE_TIME = 12;
        const a1 = new Audio();
        const a2 = new Audio();
        const v1 = document.getElementById('vid1');
        const v2 = document.getElementById('vid2');
        const fallbackBg = document.getElementById('fallback-bg');
        const progressBar = document.getElementById('progress');
        const timeCurrentEl = document.getElementById('time-current');
        const timeTotalEl = document.getElementById('time-total');
        const playBtn = document.getElementById('btn-play');
        const mixingBadge = document.getElementById('mixing-badge');
        
        a1.crossOrigin = "anonymous";
        a2.crossOrigin = "anonymous";

        const initAudioContext = () => { 
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            analyser = audioCtx.createAnalyser(); 
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount); 
            
            const s1 = audioCtx.createMediaElementSource(a1); 
            const s2 = audioCtx.createMediaElementSource(a2); 
            
            s1.connect(analyser); 
            s2.connect(analyser); 
            analyser.connect(audioCtx.destination); 
            
            drawEQ(); 
        };

        const drawEQ = () => { 
            analyser.getByteFrequencyData(dataArray); 
            document.documentElement.style.setProperty('--beat-scale', 1 + (dataArray[1] / 255 * 0.08)); 
            requestAnimationFrame(drawEQ); 
        };

        const parseLRC = lrc => {
            return lrc.split('\n').map(l => { 
                const m = l.match(/^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/); 
                return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() || "•••" } : null; 
            }).filter(Boolean).sort((a,b) => a.time - b.time);
        };

        const renderLyrics = () => { 
            const c = document.getElementById('lyrics-content'); 
            c.innerHTML = ''; 
            
            currentLyrics.forEach((l, i) => { 
                const d = document.createElement('div'); 
                d.className = 'lyric-line'; 
                d.textContent = l.text; 
                d.id = `lyric-${i}`; 
                d.onclick = () => { 
                    let a = activeLayer === 1 ? a1 : a2; 
                    if(a.duration) a.currentTime = l.time; 
                }; 
                c.appendChild(d); 
            }); 
        };

        const updateLyricsScroll = () => {
            const container = document.getElementById('lyrics-content');
            const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
            
            if (activeLyricIndex < 0 || !isLyricsVisible || !activeEl) return;
            
            document.querySelectorAll('.lyric-line').forEach((el, i) => {
                el.classList.toggle('active', i === activeLyricIndex);
            });
            
            container.scrollTo({ 
                top: activeEl.offsetTop - (container.clientHeight * 0.45), 
                behavior: 'smooth' 
            });
        };

        const loadLyrics = async (track, dur) => {
            lyricsRequestCount++; 
            let reqId = lyricsRequestCount; 
            currentLyrics =[]; 
            activeLyricIndex = -1;
            
            const content = document.getElementById('lyrics-content'); 
            content.innerHTML = '<div class="lyric-line" style="opacity:0.5;">Sincronizando...</div>';
            
            let artist = track.artist.split(/,|y|&/)[0].trim();
            let match = null;
            
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track.title)}&duration=${Math.round(dur)}`);
                if(res.ok) match = await res.json();
            } catch(e) {}
            
            if (reqId !== lyricsRequestCount) return;
            
            if(match?.syncedLyrics) { 
                currentLyrics = parseLRC(match.syncedLyrics); 
                renderLyrics(); 
            } else {
                content.innerHTML = '<div class="lyric-line" style="opacity:0.5;">Letra no disponible</div>';
            }
        };

        const handleAudioTick = (e) => {
            let a = activeLayer === 1 ? a1 : a2;
            let v = activeLayer === 1 ? v1 : v2;
            
            if (e.target === a && !isDragging && v.src && Math.abs(a.currentTime - v.currentTime) > 0.3) {
                v.currentTime = a.currentTime;
            }
            
            if (e.target === a && !isCrossfading && a.duration && (a.duration - a.currentTime <= CROSSFADE_TIME)) {
                startAutomaticCrossfade();
            }
            
            if (isCrossfading && fadingOutAudio && fadingInAudio) {
                let p = Math.min((Date.now() - fadeStartTime) / 1000 / CROSSFADE_TIME, 1);
                fadingOutAudio.volume = Math.cos(p * 0.5 * Math.PI); 
                fadingInAudio.volume = Math.sin(p * 0.5 * Math.PI);
                
                if (p >= 1) { 
                    fadingOutAudio.pause(); 
                    fadingOutAudio.volume = 0; 
                    isCrossfading = false; 
                    mixingBadge.classList.remove('active'); 
                    fadingOutAudio = fadingInAudio = null; 
                }
            }
        };

        const updateVisualLoop = () => {
            let a = activeLayer === 1 ? a1 : a2;
            
            if (a.duration && !isDragging) {
                let pct = (a.currentTime / a.duration) * 100;
                progressBar.value = pct; 
                progressBar.style.setProperty('--progress', `${pct}%`);
                
                timeCurrentEl.textContent = formatTime(a.currentTime); 
                timeTotalEl.textContent = formatTime(a.duration);
                
                let idx = currentLyrics.findIndex((l, i) => a.currentTime >= l.time - 0.1 && (!currentLyrics[i+1] || a.currentTime < currentLyrics[i+1].time));
                
                if (idx !== -1 && idx !== activeLyricIndex) { 
                    activeLyricIndex = idx; 
                    updateLyricsScroll(); 
                }
            }
            requestAnimationFrame(updateVisualLoop);
        };

        const playTrack = (idx, manual = true) => {
            isCrossfading = false; 
            mixingBadge.classList.remove('active'); 
            
            if(fadingOutAudio) fadingOutAudio.pause();
            
            let nL = activeLayer === 1 ? 2 : 1;
            let cA = activeLayer === 1 ? a1 : a2;
            let nA = nL === 1 ? a1 : a2;
            let nV = nL === 1 ? v1 : v2;
            let t = playlist[idx];
            
            currentIdx = idx; 
            nA.src = t.file; 
            nV.src = t.video || ""; 
            nA.currentTime = 0;
            
            updateUI(t, nL);
            
            if(manual) { 
                cA.pause(); 
                cA.volume = 0; 
                nA.volume = 1; 
                if(isPlaying) { 
                    nA.play(); 
                    if(t.video) nV.play(); 
                } 
                activeLayer = nL; 
            }
        };

        const startAutomaticCrossfade = () => {
            isCrossfading = true; 
            mixingBadge.classList.add('active'); 
            fadeStartTime = Date.now();
            
            let nIdx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIdx + 1) % playlist.length;
            let nL = activeLayer === 1 ? 2 : 1;
            let t = playlist[nIdx];
            
            fadingOutAudio = activeLayer === 1 ? a1 : a2; 
            fadingInAudio = nL === 1 ? a1 : a2;
            let nV = nL === 1 ? v1 : v2; 
            
            fadingInAudio.src = t.file; 
            fadingInAudio.volume = 0; 
            
            if(t.video) { 
                nV.src = t.video; 
                nV.load(); 
                nV.play(); 
            }
            
            fadingInAudio.play(); 
            currentIdx = nIdx; 
            activeLayer = nL; 
            updateUI(t, nL);
        };

        const updateUI = (t, L) => {
            document.getElementById('title').textContent = t.title; 
            document.getElementById('artist').textContent = t.artist; 
            document.getElementById('cover').src = t.cover;
            
            let a = L === 1 ? a1 : a2;
            let ck = setInterval(() => { 
                if(a.duration) { 
                    clearInterval(ck); 
                    loadLyrics(t, a.duration); 
                } 
            }, 100);
            
            if(t.video) { 
                fallbackBg.classList.remove('active'); 
                (L === 1 ? v1 : v2).classList.add('active'); 
                (L === 1 ? v2 : v1).classList.remove('active'); 
            } else { 
                v1.classList.remove('active'); 
                v2.classList.remove('active'); 
                fallbackBg.src = t.cover; 
                fallbackBg.classList.add('active'); 
            }
            extractColors(t.cover);
        };

        const extractColors = (src) => {
            const img = new Image(); 
            img.crossOrigin = "Anonymous"; 
            img.src = src;
            
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d'); 
                cvs.width = cvs.height = 40; 
                ctx.drawImage(img, 0, 0, 40, 40);
                
                const d = ctx.getImageData(0, 0, 40, 40).data; 
                let candidates =[];
                
                for(let i=0; i<d.length; i+=16) {
                    let r = d[i], g = d[i+1], b = d[i+2];
                    let max = Math.max(r,g,b), min = Math.min(r,g,b);
                    let l = (max+min)/510, s = (max-min)/(max||1);
                    let score = s * (1 - Math.abs(0.5 - l));
                    if(l > 0.15 && l < 0.85) candidates.push({rgb:[r,g,b], score, s});
                }
                
                candidates.sort((a,b) => b.score - a.score);
                let c1 = candidates[0]?.rgb ||[255, 255, 255];
                let c2 = candidates.find(c => {
                    let diff = Math.abs(c.rgb[0]-c1[0]) + Math.abs(c.rgb[1]-c1[1]) + Math.abs(c.rgb[2]-c1[2]);
                    return diff > 100;
                })?.rgb || candidates[candidates.length-1]?.rgb ||[120, 120, 120];
                
                document.documentElement.style.setProperty('--accent-1', `rgb(${c1[0]},${c1[1]},${c1[2]})`);
                document.documentElement.style.setProperty('--accent-2', `rgb(${c2[0]},${c2[1]},${c2[2]})`);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${c1[0]},${c1[1]},${c1[2]},0.4)`);
            };
        };

        const formatTime = s => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        playBtn.onclick = () => {
            initAudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if(isPlaying) { 
                a1.pause(); 
                a2.pause(); 
                v1.pause(); 
                v2.pause(); 
                document.body.classList.add('player-paused'); 
            } else { 
                if(a1.volume > 0) a1.play(); 
                if(a2.volume > 0) a2.play(); 
                if(playlist[currentIdx].video) (activeLayer === 1 ? v1 : v2).play(); 
                document.body.classList.remove('player-paused'); 
            }
            
            isPlaying = !isPlaying; 
            document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block'; 
            document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        };

        document.getElementById('btn-lyrics').onclick = function() { 
            isLyricsVisible = !isLyricsVisible; 
            document.getElementById('lyrics-overlay').classList.toggle('show'); 
            if(isLyricsVisible) updateLyricsScroll(); 
        };
        
        document.getElementById('btn-next').onclick = () => playTrack((currentIdx + 1) % playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIdx - 1 + playlist.length) % playlist.length);
        
        document.getElementById('btn-shuffle').onclick = function() { 
            isShuffle = !isShuffle; 
            this.classList.toggle('active'); 
        };
        
        document.getElementById('btn-repeat').onclick = function() { 
            isRepeat = !isRepeat; 
            this.classList.toggle('active'); 
        };
        
        progressBar.oninput = e => { 
            isDragging = true; 
            progressBar.style.setProperty('--progress', `${e.target.value}%`); 
        };
        
        progressBar.onchange = e => { 
            isDragging = false; 
            let a = activeLayer === 1 ? a1 : a2; 
            if(a.duration) a.currentTime = (e.target.value/100) * a.duration; 
        };
        
        a1.ontimeupdate = a2.ontimeupdate = handleAudioTick;
        requestAnimationFrame(updateVisualLoop);
        playTrack(currentIdx, true);
    </script>

    <!-- SCRIPT DE ANIMACIONES VISUALES (Se añade para cumplir la microinteracción de slide-up sin tocar tu JS) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Animación de Slide-Up y Fade-In para Textos
            const textObserver = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'characterData' || mutation.type === 'childList') {
                        // Verificamos que no estemos en crossfade (donde la animacion CSS se encarga)
                        if(!document.getElementById('mixing-badge').classList.contains('active')) {
                            document.getElementById('track-text-container').animate([
                                { opacity: 0, transform: 'translateY(10px)' },
                                { opacity: 1, transform: 'translateY(0)' }
                            ], { duration: 600, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' });
                        }
                    }
                });
            });
            textObserver.observe(document.getElementById('title'), { childList: true, characterData: true, subtree: true });

            // Animación de Portada al cambiar manualmente de canción
            const coverObserver = new MutationObserver(() => {
                if(!document.getElementById('mixing-badge').classList.contains('active')) {
                    document.querySelector('.artwork-container').animate([
                        { opacity: 0, transform: 'scale(0.95)' },
                        { opacity: 1, transform: 'scale(1)' }
                    ], { duration: 800, easing: 'cubic-bezier(0.4, 0, 0.2, 1)' });
                }
            });
            coverObserver.observe(document.getElementById('cover'), { attributes: true, attributeFilter:['src'] });
        });
    </script>
