<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Apple Mini Pro</title>
    <style>
        @property --accent { syntax: '<color>'; inherits: true; initial-value: #ff0072; }
        @property --glass { syntax: '<color>'; inherits: true; initial-value: rgba(255,255,255,0.1); }
        :root {
            --bg: #000; --text: #fff; --sub: rgba(255,255,255,0.5);
            --spring: cubic-bezier(0.23, 1, 0.32, 1); --beat: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* VIBRANT BACKGROUND */
        .mesh { position: absolute; inset: 0; filter: blur(100px) saturate(2); z-index: 1; opacity: 0.6; }
        .blob { position: absolute; width: 70vmax; height: 70vmax; background: var(--accent); border-radius: 50%; animation: roam 25s infinite alternate ease-in-out; }
        @keyframes roam { from { transform: translate(-10%,-10%) scale(1); } to { transform: translate(15%,15%) scale(1.2); } }

        .video-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; opacity: 0; transition: 1.5s; filter: brightness(0.5); }
        .video-bg.active { opacity: 0.4; }

        /* MINI PLAYER BOTTOM RIGHT */
        .player-anchor { position: absolute; bottom: 30px; right: 30px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; width: 340px; }
        
        /* LYRICS PANEL (POPS UP FROM PLAYER) */
        .lyr-panel { width: 100%; height: 0; background: var(--glass); backdrop-filter: blur(40px) saturate(2); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; overflow: hidden; opacity: 0; transition: 0.6s var(--spring); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .lyr-panel.show { height: 350px; opacity: 1; margin-bottom: 5px; }
        .lyr-scroll { height: 100%; overflow-y: scroll; padding: 30px; scrollbar-width: none; mask-image: linear-gradient(transparent, #000 15%, #000 85%, transparent); }
        .l-line { font-size: 19px; font-weight: 700; margin: 18px 0; opacity: 0.2; transition: 0.4s var(--spring); transform: scale(0.95); filter: blur(1px); cursor: pointer; }
        .l-line.active { opacity: 1; transform: scale(1.05); filter: blur(0); color: var(--text); text-shadow: 0 0 15px rgba(255,255,255,0.3); }

        /* THE COMPACT DECK */
        .deck { width: 100%; background: var(--glass); backdrop-filter: blur(40px) saturate(2); border: 1px solid rgba(255,255,255,0.15); border-radius: 28px; padding: 16px; display: flex; align-items: center; gap: 14px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: background 0.8s; }

        .art { width: 64px; height: 64px; border-radius: 12px; overflow: hidden; flex-shrink: 0; transform: scale(var(--beat)); transition: 0.3s var(--spring); box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .art img { width: 100%; height: 100%; object-fit: cover; }
        body.player-paused .art { transform: scale(0.85); opacity: 0.8; }

        .main-info { flex: 1; min-width: 0; }
        .main-info h1 { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .main-info p { font-size: 12px; color: var(--sub); font-weight: 500; margin-top: 1px; }

        /* PROGRESS BAR OVER ARTWORK BORDER-STYLE */
        .prog-mini { width: 100%; height: 3px; background: rgba(255,255,255,0.1); margin-top: 8px; border-radius: 2px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--text); width: var(--p, 0%); transition: width 0.1s linear; }

        .controls { display: flex; align-items: center; gap: 12px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; transition: 0.2s; padding: 4px; }
        .btn:active { transform: scale(0.8); }
        .btn svg { width: 22px; height: 22px; fill: currentColor; }
        .play { width: 38px; height: 38px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .play svg { width: 18px; height: 18px; fill: #000; }
        
        .mixing { position: absolute; top: -10px; left: 20px; font-size: 8px; font-weight: 900; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 5px; opacity: 0; transition: 0.4s; }
        .mixing.active { opacity: 1; transform: translateY(-5px); }
    </style>
</head>
<body class="player-paused">

    <div class="mesh"><div class="blob"></div></div>
    <video id="v1" class="video-bg active" muted playsinline></video>
    <video id="v2" class="video-bg" muted playsinline></video>

    <div class="player-anchor">
        <div id="lyr-p" class="lyr-panel">
            <div id="lyr-s" class="lyr-scroll"></div>
        </div>

        <div id="mix" class="mixing">MIXING...</div>
        
        <div class="deck">
            <div class="art"><img id="cover" src="" alt=""></div>
            
            <div class="main-info">
                <h1 id="title">Selecciona canción</h1>
                <p id="artist">VIVET</p>
                <div class="prog-mini"><div id="prog" class="prog-fill"></div></div>
            </div>

            <div class="controls">
                <button class="btn" id="btn-l"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H4V6h16v12zM7 8h10v2H7zm0 4h10v2H7z"/></svg></button>
                <button class="btn play" id="play">
                    <svg id="i-p" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="i-s" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" }
        ];

        let cur = 0, playing = false, crossing = false, activeA = 1, lyrics = [], lyrI = -1, audioCtx, analyser, dataA;
        const $ = s => document.querySelector(s), a1 = new Audio(), a2 = new Audio();
        [a1, a2].forEach(a => { a.crossOrigin = "anonymous"; a.ontimeupdate = e => handleTime(e); });

        const initAudio = () => {
            if (audioCtx) return; audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; dataA = new Uint8Array(analyser.frequencyBinCount);
            [a1, a2].forEach(a => audioCtx.createMediaElementSource(a).connect(analyser));
            analyser.connect(audioCtx.destination); loop();
        };

        const loop = () => {
            analyser.getByteFrequencyData(dataA);
            document.documentElement.style.setProperty('--beat', 1 + (dataA[1]/255 * 0.08));
            requestAnimationFrame(loop);
        };

        const load = (idx, man = true) => {
            crossing = false; $('#mix').classList.remove('active');
            let nA = activeA === 1 ? a2 : a1, cA = activeA === 1 ? a1 : a2, t = playlist[idx];
            cur = idx; nA.src = t.file; 
            if(man) { cA.pause(); cA.volume = 0; nA.volume = 1; if(playing) nA.play(); activeA = activeA === 1 ? 2 : 1; }
            ui(t);
        };

        const ui = (t) => {
            $('#title').innerText = t.title; $('#artist').innerText = t.artist; $('#cover').src = t.cover;
            const vA = activeA === 1 ? $('#v1') : $('#v2'), vB = activeA === 1 ? $('#v2') : $('#v1');
            if(t.video) { vA.src = t.video; vA.classList.add('active'); vB.classList.remove('active'); vA.play(); }
            color(t.cover); fetchLyr(t, activeA === 1 ? a1 : a2);
        };

        const color = (src) => {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = src;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 1;
                ctx.drawImage(img, 0,0,1,1); const d = ctx.getImageData(0,0,1,1).data;
                const rgb = `rgb(${d[0]},${d[1]},${d[2]})`;
                const glass = `rgba(${d[0]},${d[1]},${d[2]}, 0.25)`;
                document.documentElement.style.setProperty('--accent', rgb);
                document.documentElement.style.setProperty('--glass', glass);
            };
        };

        const fetchLyr = async (t, aud) => {
            lyrics = []; $('#lyr-s').innerHTML = '<div class="l-line active">Buscando letra...</div>';
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(t.artist.split(',')[0])}&track_name=${encodeURIComponent(t.title)}&duration=${Math.round(aud.duration || 180)}`);
                const data = await res.json();
                if(data.syncedLyrics) {
                    lyrics = data.syncedLyrics.split('\n').map(l => {
                        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                        return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3] } : null;
                    }).filter(Boolean);
                    $('#lyr-s').innerHTML = lyrics.map((l, i) => `<div class="l-line" id="l-${i}" onclick="seek(${l.t})">${l.text || '•••'}</div>`).join('');
                } else { $('#lyr-s').innerHTML = '<div class="l-line active">Instrumental</div>'; }
            } catch(e) { $('#lyr-s').innerHTML = '<div class="l-line active">Sin letra</div>'; }
        };

        window.seek = t => { (activeA === 1 ? a1 : a2).currentTime = t; };

        const handleTime = e => {
            let a = activeA === 1 ? a1 : a2; if (e.target !== a) return;
            if (!crossing && a.duration && (a.duration - a.currentTime <= 12)) {
                crossing = true; $('#mix').classList.add('active');
                let nIdx = (cur+1)%playlist.length; load(nIdx, false);
                let nA = activeA === 1 ? a2 : a1; nA.volume = 0; nA.play();
                let f = setInterval(() => {
                    a.volume = Math.max(0, a.volume - 0.1); nA.volume = Math.min(1, nA.volume + 0.1);
                    if(nA.volume >= 1) { clearInterval(f); a.pause(); activeA = activeA === 1 ? 2 : 1; crossing = false; $('#mix').classList.remove('active'); }
                }, 150);
            }
            const p = (a.currentTime / a.duration) * 100;
            $('#prog').style.setProperty('--p', `${p}%`);
            
            let idx = lyrics.findIndex((l, i) => a.currentTime >= l.t && (!lyrics[i+1] || a.currentTime < lyrics[i+1].t));
            if (idx !== -1 && idx !== lyrI) {
                lyrI = idx; document.querySelectorAll('.l-line').forEach((el, i) => el.className = `l-line ${i===idx?'active':''}`);
                const el = $(`#l-${idx}`); if(el) $('#lyr-s').scrollTo({ top: el.offsetTop - 100, behavior: 'smooth' });
            }
        };

        $('#play').onclick = () => {
            initAudio(); playing = !playing;
            const a = activeA === 1 ? a1 : a2; const v = activeA === 1 ? $('#v1') : $('#v2');
            playing ? (a.play(), v.play(), $('body').classList.remove('player-paused')) : (a.pause(), v.pause(), $('body').classList.add('player-paused'));
            $('#i-p').style.display = playing ? 'none' : 'block'; $('#i-s').style.display = playing ? 'block' : 'none';
        };

        $('#next').onclick = () => load((cur+1)%playlist.length);
        $('#btn-l').onclick = () => $('#lyr-p').classList.toggle('show');
        
        load(0);
    </script>
</body>
</html>
