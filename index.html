<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    <style>
        @property --accent-color { syntax: '<color>'; inherits: true; initial-value: #ffffff; }
        :root {
            --accent-color: #ffffff; --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.6);
            --lyric-inactive: rgba(255, 255, 255, 0.2); --beat-scale: 1;
            transition: --accent-color 0.8s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; width: 100vw; background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; overflow: hidden; perspective: 1000px; }

        /* MESH BACKGROUND DYNAMICS */
        .background-container { position: absolute; inset: 0; z-index: 1; overflow: hidden; filter: blur(80px) brightness(0.5); }
        .blob { position: absolute; width: 60vw; height: 60vw; background: var(--accent-color); border-radius: 50%; opacity: 0.4; animation: move 25s infinite alternate ease-in-out; transition: background 1s; }
        .blob:nth-child(2) { top: 40%; left: 30%; width: 70vw; height: 70vw; animation-duration: 35s; opacity: 0.2; }
        @keyframes move { from { transform: translate(-20%, -20%) rotate(0deg); } to { transform: translate(20%, 20%) rotate(360deg); } }

        .video-background { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; opacity: 0; transition: opacity 1.5s ease; filter: brightness(0.6); }
        .video-background.active { opacity: 0.5; }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, transparent, rgba(0,0,0,0.8)); z-index: 3; }

        /* PLAYER LAYOUT */
        .player-app { position: relative; z-index: 10; width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; padding: 20px; justify-content: space-between; }

        .header { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 11px; font-weight: 900; letter-spacing: 5px; color: var(--accent-color); text-shadow: 0 0 15px var(--accent-glow); margin-top: 10px; }
        .site-logo { width: 28px; height: 28px; background: var(--accent-color); -webkit-mask: url('covers/LOGO.png') no-repeat center/contain; mask: url('covers/LOGO.png') no-repeat center/contain; transform: scale(var(--beat-scale)); transition: 0.2s; }
        body:not(.player-paused) .site-logo { animation: rotateLogo 12s infinite linear; }
        @keyframes rotateLogo { from { transform: scale(var(--beat-scale)) rotate(0); } to { transform: scale(var(--beat-scale)) rotate(360deg); } }

        /* ARTWORK SQUISHY EFFECT */
        #artwork-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 0; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .artwork-container { width: 85%; aspect-ratio: 1; border-radius: 35px; overflow: hidden; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px var(--accent-glow); transform: scale(var(--beat-scale)); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        body.player-paused .artwork-container { transform: scale(0.85); opacity: 0.7; filter: grayscale(0.2); }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }

        /* FLOATING DECK (EL DOCK) */
        .floating-deck { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px) saturate(1.5); -webkit-backdrop-filter: blur(25px) saturate(1.5); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 40px; padding: 25px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .track-info { margin-bottom: 20px; text-align: left; position: relative; }
        .track-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
        .track-artist { font-size: 16px; color: var(--accent-color); opacity: 0.8; font-weight: 500; }
        
        .progress-area { margin-bottom: 25px; }
        .progress-bar { -webkit-appearance: none; width: 100%; height: 5px; border-radius: 10px; background: rgba(255,255,255,0.1); background-image: linear-gradient(var(--accent-color), var(--accent-color)); background-size: var(--progress, 0%) 100%; background-repeat: no-repeat; cursor: pointer; }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--accent-color); }
        .time-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 10px; font-weight: 700; color: var(--text-sub); opacity: 0.6; }

        .controls { display: flex; align-items: center; justify-content: space-between; }
        .btn { background: none; border: none; cursor: pointer; color: #fff; transition: 0.3s var(--spring-easing); display: flex; align-items: center; }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }
        .btn:active { transform: scale(0.85); }
        .btn-play { width: 65px; height: 65px; background: #fff; color: #000; border-radius: 50%; justify-content: center; box-shadow: 0 10px 25px rgba(255,255,255,0.2); }
        .btn-play svg { width: 30px; height: 30px; fill: #000; }
        .btn-secondary { opacity: 0.4; }
        .btn-secondary.active { opacity: 1; color: var(--accent-color); }

        /* LYRICS OVERLAY MODERN */
        .lyrics-overlay { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(40px); opacity: 0; pointer-events: none; transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); padding-top: 100px; }
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; }
        .lyrics-content { height: 100%; overflow-y: scroll; padding: 0 30px 50% 30px; scrollbar-width: none; mask-image: linear-gradient(to bottom, transparent, #000 20%, #000 80%, transparent); }
        .lyric-line { font-size: 26px; font-weight: 800; margin: 25px 0; color: var(--lyric-inactive); transition: 0.5s; filter: blur(2px); transform: scale(0.9); }
        .lyric-line.active { color: #fff; filter: blur(0); transform: scale(1.1); text-shadow: 0 0 20px var(--accent-glow); }

        .mixing-badge { position: absolute; top: -15px; right: 25px; background: var(--accent-color); color: #000; padding: 4px 12px; border-radius: 10px; font-size: 9px; font-weight: 900; opacity: 0; transform: translateY(10px); transition: 0.4s; }
        .mixing-badge.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="player-paused">

    <div class="background-container">
        <div class="blob"></div><div class="blob"></div>
    </div>
    <video id="vid1" class="video-background active" crossorigin="anonymous" muted playsinline></video>
    <video id="vid2" class="video-background" crossorigin="anonymous" muted playsinline></video>
    <div class="overlay"></div>

    <div class="player-app">
        <div class="header">
            <div class="site-logo"></div> V I V E T
        </div>
        
        <div id="artwork-wrapper">
            <div class="artwork-container">
                <img id="cover" src="" alt="Cargando..." crossorigin="anonymous">
            </div>
        </div>

        <div class="floating-deck">
            <div class="mixing-badge" id="mixing-badge">MIXING...</div>
            <div class="track-info">
                <div class="track-title" id="title">Cargando...</div>
                <div class="track-artist" id="artist">VIVET Music</div>
            </div>

            <div class="progress-area">
                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
                <div class="time-info"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuf"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="i-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="i-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn btn-secondary" id="btn-lyr"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H4V6h16v12zM7 8h10v2H7zm0 4h10v2H7z"/></svg></button>
            </div>
        </div>
    </div>

    <div id="lyrics-overlay" class="lyrics-overlay">
        <div id="lyrics-content" class="lyrics-content"></div>
    </div>

    <script>
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" }
        ];

        let curIdx = 0, isPlaying = false, isShuf = false, isCross = false, activeL = 1, curLyr = [], lyrIdx = -1, audioCtx, analyser, dataA;
        const crossT = 12, a1 = new Audio(), a2 = new Audio(), $ = s => document.querySelector(s);
        a1.crossOrigin = a2.crossOrigin = "anonymous";

        const initCtx = () => {
            if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; dataA = new Uint8Array(analyser.frequencyBinCount);
            [a1, a2].forEach(a => audioCtx.createMediaElementSource(a).connect(analyser));
            analyser.connect(audioCtx.destination); drawEq();
        };

        const drawEq = () => {
            analyser.getByteFrequencyData(dataA);
            document.documentElement.style.setProperty('--beat-scale', 1 + (dataA[1] / 255 * 0.05));
            requestAnimationFrame(drawEq);
        };

        const loadTrack = (idx, manual = true) => {
            isCross = false; $('#mixing-badge').classList.remove('active');
            let nL = activeL === 1 ? 2 : 1, cA = activeL === 1 ? a1 : a2, nA = nL === 1 ? a1 : a2, t = playlist[idx];
            curIdx = idx; nA.src = t.file; 
            if(manual) { cA.pause(); cA.volume = 0; nA.volume = 1; if(isPlaying) nA.play(); activeL = nL; }
            updateUI(t, nL);
        };

        const updateUI = (t, L) => {
            $('#title').textContent = t.title; $('#artist').textContent = t.artist; $('#cover').src = t.cover;
            const vA = L === 1 ? $('#vid1') : $('#vid2'), vB = L === 1 ? $('#vid2') : $('#vid1');
            if(t.video) { vA.src = t.video; vA.classList.add('active'); vB.classList.remove('active'); vA.play(); }
            else { vA.classList.remove('active'); vB.classList.remove('active'); }
            extractCol(t.cover); loadLyr(t, (L === 1 ? a1 : a2));
        };

        const extractCol = (src) => {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = src;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const d = ctx.getImageData(0, 0, 10, 10).data;
                document.documentElement.style.setProperty('--accent-color', `rgb(${d[0]},${d[1]},${d[2]})`);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${d[0]},${d[1]},${d[2]},0.4)`);
            };
        };

        const loadLyr = async (t, aud) => {
            curLyr = []; $('#lyrics-content').innerHTML = '•••';
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(t.artist.split(',')[0])}&track_name=${encodeURIComponent(t.title)}&duration=${Math.round(aud.duration || 200)}`);
                const data = await res.json();
                if(data.syncedLyrics) {
                    curLyr = data.syncedLyrics.split('\n').map(l => {
                        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                        return m ? { t: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3] } : null;
                    }).filter(Boolean);
                    $('#lyrics-content').innerHTML = curLyr.map((l, i) => `<div class="lyric-line" id="lyr-${i}">${l.text}</div>`).join('');
                }
            } catch(e) {}
        };

        const handleTick = (e) => {
            let a = activeL === 1 ? a1 : a2;
            if (e.target !== a) return;
            if (!isCross && a.duration && (a.duration - a.currentTime <= crossT)) {
                isCross = true; $('#mixing-badge').classList.add('active');
                let nIdx = isShuf ? Math.floor(Math.random()*playlist.length) : (curIdx + 1) % playlist.length;
                loadTrack(nIdx, false);
                let nA = activeL === 1 ? a2 : a1; nA.volume = 0; nA.play();
                let fade = setInterval(() => {
                    a.volume = Math.max(0, a.volume - 0.05); nA.volume = Math.min(1, nA.volume + 0.05);
                    if(nA.volume >= 1) { clearInterval(fade); a.pause(); activeL = activeL === 1 ? 2 : 1; isCross = false; $('#mixing-badge').classList.remove('active'); }
                }, 200);
            }
            // Sync lyrics & progress
            const pct = (a.currentTime / a.duration) * 100;
            $('#progress').value = pct; $('#progress').style.setProperty('--progress', `${pct}%`);
            $('#t-cur').textContent = formatT(a.currentTime); $('#t-tot').textContent = formatT(a.duration);
            
            let idx = curLyr.findIndex((l, i) => a.currentTime >= l.t && (!curLyr[i+1] || a.currentTime < curLyr[i+1].t));
            if (idx !== -1 && idx !== lyrIdx) {
                lyrIdx = idx;
                document.querySelectorAll('.lyric-line').forEach((el, i) => el.className = `lyric-line ${i===idx?'active':''}`);
                const activeEl = $(`#lyr-${idx}`);
                if(activeEl) $('#lyrics-content').scrollTo({ top: activeEl.offsetTop - 150, behavior: 'smooth' });
            }
        };

        const formatT = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        $('#btn-play').onclick = () => {
            initCtx(); isPlaying = !isPlaying;
            const a = activeL === 1 ? a1 : a2; const v = activeL === 1 ? $('#vid1') : $('#vid2');
            isPlaying ? (a.play(), v.play(), $('body').classList.remove('player-paused')) : (a.pause(), v.pause(), $('body').classList.add('player-paused'));
            $('#i-play').style.display = isPlaying ? 'none' : 'block'; $('#i-pause').style.display = isPlaying ? 'block' : 'none';
        };

        $('#btn-next').onclick = () => loadTrack(isShuf ? Math.floor(Math.random()*playlist.length) : (curIdx+1)%playlist.length);
        $('#btn-prev').onclick = () => loadTrack((curIdx-1+playlist.length)%playlist.length);
        $('#btn-shuf').onclick = function() { isShuf = !isShuf; this.classList.toggle('active'); };
        $('#btn-lyr').onclick = () => $('#lyrics-overlay').classList.toggle('show');
        $('#progress').onchange = e => { let a = activeL === 1 ? a1 : a2; a.currentTime = (e.target.value/100)*a.duration; };
        
        a1.ontimeupdate = a2.ontimeupdate = handleTick;
        loadTrack(0);
    </script>
</body>
</html>
