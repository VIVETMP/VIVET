<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    
    <style>
        @property --accent-1 { syntax: '<color>'; inherits: true; initial-value: #ffffff; }
        @property --accent-2 { syntax: '<color>'; inherits: true; initial-value: #ffffff; }
        @property --border-angle { syntax: '<angle>'; inherits: true; initial-value: 0deg; }

        :root {
            --accent-1: #ffffff;
            --accent-2: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.2);
            --bg-dark: #000000;
            --spring-easing: cubic-bezier(0.23, 1, 0.32, 1);
            --beat-scale: 1;
            transition: --accent-1 1.2s ease, --accent-2 1.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            height: 100vh; width: 100vw; 
            background-color: var(--bg-dark); 
            display: flex; justify-content: flex-end; align-items: flex-end; 
            overflow: hidden; position: relative; padding: 40px;
        }

        /* FONDO */
        .video-background, .image-fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0; transition: opacity 2s ease; }
        .video-background.active, .image-fallback.active { opacity: 0.55; z-index: 2; }
        .image-fallback { filter: blur(100px) brightness(0.5); transform: scale(1.1); }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 50%, transparent, rgba(0,0,0,0.8)); z-index: 3; }

        /* ISLA REPRODUCTOR - ULTRA TRANSPARENTE 5% */
        .player-app { 
            position: relative; z-index: 10; 
            width: 500px; 
            height: 250px; /* Altura aumentada para máximo aire abajo */
            background: rgba(255, 255, 255, 0.05); /* 5% Opacidad */
            backdrop-filter: blur(60px) saturate(2.5); /* Desenfoque extremo para lujo */
            -webkit-backdrop-filter: blur(60px) saturate(2.5);
            border-radius: 60px;
            padding: 40px; /* Más espacio interno */
            display: flex; flex-direction: row; align-items: center; gap: 32px;
            border: 0.5px solid rgba(255, 255, 255, 0.1); /* Borde de luz muy fino */
            box-shadow: 0 50px 120px rgba(0,0,0,0.9); 
            transform: translateZ(0);
        }

        /* LÍNEA RADIANTE CONTINUA */
        .player-app::before, .player-app::after {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 62px;
            padding: 3.5px;
            background: conic-gradient(from var(--border-angle), var(--accent-1), var(--accent-2), transparent, var(--accent-1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
            animation: rotateBorder 4s linear infinite;
        }
        .player-app::before { filter: blur(25px); opacity: 0.8; inset: -8px; }

        @keyframes rotateBorder { to { --border-angle: 360deg; } }

        /* LYRICS */
        .lyrics-overlay { 
            position: absolute; 
            bottom: calc(100% + 30px); left: 0; right: 0; 
            height: 260px; z-index: 100; 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(50px) saturate(2);
            -webkit-backdrop-filter: blur(50px) saturate(2);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            opacity: 0; pointer-events: none; 
            transform: translateY(15px);
            transition: all 0.7s var(--spring-easing);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .lyrics-content { width: 100%; height: 100%; overflow-y: auto; padding: 75px 40px; scrollbar-width: none; }
        .lyric-line { font-size: 22px; font-weight: 900; margin: 26px 0; text-align: left; color: rgba(255,255,255,0.15); transition: 0.4s; letter-spacing: -0.9px; }
        .lyric-line.active { color: #ffffff; transform: scale(1.05); }

        /* PORTADA */
        #artwork-wrapper { 
            width: 140px; height: 140px; flex-shrink: 0;
            transform: scale(var(--beat-scale)); transition: 0.1s linear;
        }
        .artwork-container { width: 100%; height: 100%; border-radius: 35px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.7); }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTENEDOR DERECHO */
        .controls-wrapper { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: space-between; height: 100%; min-width: 0;
        }
        
        /* HEADER VIVET */
        .header { 
            display: flex; align-items: center; justify-content: space-between; 
            font-size: 11px; font-weight: 900; letter-spacing: 4px; 
            color: var(--accent-1); margin-bottom: 5px;
        }
        .site-logo { width: 26px; height: 26px; background-color: var(--accent-1); -webkit-mask: url('covers/LOGO.png') no-repeat center/contain; }

        /* TRACK INFO */
        .track-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .track-title { font-size: 23px; font-weight: 900; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.9px; line-height: 1.1; }
        .track-artist { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); margin-top: 4px; }

        /* PROGRESO */
        .progress-bar { 
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 12px;
            background: rgba(255,255,255,0.15); outline: none;
            background-image: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
        }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 0; height: 0; }
        .time-info { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.4); }

        /* BOTONES - TODOS CON COLOR DE PORTADA */
        .controls { display: flex; align-items: center; justify-content: space-between; width: 100%; padding-bottom: 10px; }
        .btn { background: none!important; border: none!important; cursor: pointer; color: var(--accent-1); transition: 0.3s; display: flex; align-items: center; }
        .btn:hover { transform: scale(1.25); filter: drop-shadow(0 0 15px var(--accent-glow)); }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }
        
        .btn-play { 
            width: 62px; height: 62px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2))!important; 
            color: #000!important; justify-content: center; box-shadow: 0 15px 40px var(--accent-glow);
        }
        .btn-play svg { width: 30px; height: 30px; fill: #000!important; }
        
        .btn-secondary { opacity: 0.5; }
        .btn-secondary.active { opacity: 1; filter: drop-shadow(0 0 10px var(--accent-glow)); }

        .mixing-badge { 
            position: absolute; top: -20px; left: 50px; 
            background: var(--accent-1); color: #000; 
            padding: 5px 20px; border-radius: 30px; 
            font-size: 10px; font-weight: 900; opacity: 0; transition: 0.5s;
            box-shadow: 0 10px 25px var(--accent-glow); z-index: 20;
        }
        .mixing-badge.active { opacity: 1; transform: translateY(-5px); }
    </style>
</head>
<body class="player-paused">

    <img id="fallback-bg" class="image-fallback" src="" alt="Fondo">
    <video id="vid1" class="video-background active" crossorigin="anonymous" muted playsinline></video>
    <video id="vid2" class="video-background" crossorigin="anonymous" muted playsinline></video>
    <div class="overlay"></div>

    <div class="player-app">
        <div id="lyrics-overlay" class="lyrics-overlay">
            <div id="lyrics-content" class="lyrics-content"></div>
        </div>

        <div class="mixing-badge" id="mixing-badge">CROSSFADING</div>
        
        <div id="artwork-wrapper">
            <div class="artwork-container">
                <img id="cover" src="" crossorigin="anonymous">
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="site-logo"></div> V I V E T

                    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H4c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h16c.55 0 1 .45 1 1v12c0 .55.45-1-1 1zM7 8h10v2H7zm0 4h10v2H7z"/></svg>
                </button>
            </div>

            <div class="progress-area">
                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn btn-secondary" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        // MANTENIENDO TU LÓGICA DE CANCIONES Y CROSSFADE
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" }
        ];

        let currentIdx = 0, isPlaying = false, isDragging = false, isShuffle = false, isRepeat = false, isCrossfading = false, fadeStartTime = 0, fadingOutAudio = null, fadingInAudio = null, activeLayer = 1, currentLyrics = [], activeLyricIndex = -1, isLyricsVisible = false, lyricsRequestCount = 0, colorCache = {}, audioCtx, analyser, dataArray;
        const CROSSFADE_TIME = 12, a1 = new Audio(), a2 = new Audio(), v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2'), fallbackBg = document.getElementById('fallback-bg'), progressBar = document.getElementById('progress'), timeCurrentEl = document.getElementById('time-current'), timeTotalEl = document.getElementById('time-total'), playBtn = document.getElementById('btn-play'), mixingBadge = document.getElementById('mixing-badge');
        a1.crossOrigin = a2.crossOrigin = "anonymous";

        const initAudioContext = () => { if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; dataArray = new Uint8Array(analyser.frequencyBinCount); const s1 = audioCtx.createMediaElementSource(a1); const s2 = audioCtx.createMediaElementSource(a2); s1.connect(analyser); s2.connect(analyser); analyser.connect(audioCtx.destination); drawEQ(); };

        const drawEQ = () => { analyser.getByteFrequencyData(dataArray); document.documentElement.style.setProperty('--beat-scale', 1 + (dataArray[1] / 255 * 0.08)); requestAnimationFrame(drawEQ); };

        const parseLRC = lrc => lrc.split('\n').map(l => { const m = l.match(/^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/); return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() || "•••" } : null; }).filter(Boolean).sort((a,b) => a.time - b.time);

        const renderLyrics = () => { const c = document.getElementById('lyrics-content'); c.innerHTML = ''; currentLyrics.forEach((l, i) => { const d = document.createElement('div'); d.className = 'lyric-line'; d.textContent = l.text; d.id = `lyric-${i}`; d.onclick = () => { let a = activeLayer === 1 ? a1 : a2; if(a.duration) a.currentTime = l.time; }; c.appendChild(d); }); };

        const updateLyricsScroll = () => {
            const container = document.getElementById('lyrics-content'), activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
            if (activeLyricIndex < 0 || !isLyricsVisible || !activeEl) return;
            document.querySelectorAll('.lyric-line').forEach((el, i) => el.classList.toggle('active', i === activeLyricIndex));
            container.scrollTo({ top: activeEl.offsetTop - (container.clientHeight * 0.45), behavior: 'smooth' });
        };

        const loadLyrics = async (track, dur) => {
            lyricsRequestCount++; let reqId = lyricsRequestCount; currentLyrics = []; activeLyricIndex = -1;
            const content = document.getElementById('lyrics-content'); content.innerHTML = '<div class="lyric-line" style="opacity:0.5;">Sincronizando...</div>';
            let artist = track.artist.split(/,|y|&/)[0].trim(), match = null;
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track.title)}&duration=${Math.round(dur)}`);
                if(res.ok) match = await res.json();
            } catch(e){}
            if (reqId !== lyricsRequestCount) return;
            if(match?.syncedLyrics) { currentLyrics = parseLRC(match.syncedLyrics); renderLyrics(); } 
            else content.innerHTML = '<div class="lyric-line" style="opacity:0.5;">Letra no disponible</div>';
        };

        const handleAudioTick = (e) => {
            let a = activeLayer === 1 ? a1 : a2, v = activeLayer === 1 ? v1 : v2;
            if (e.target === a && !isDragging && v.src && Math.abs(a.currentTime - v.currentTime) > 0.3) v.currentTime = a.currentTime;
            if (e.target === a && !isCrossfading && a.duration && (a.duration - a.currentTime <= CROSSFADE_TIME)) startAutomaticCrossfade();
            if (isCrossfading && fadingOutAudio && fadingInAudio) {
                let p = Math.min((Date.now() - fadeStartTime) / 1000 / CROSSFADE_TIME, 1);
                fadingOutAudio.volume = Math.cos(p * 0.5 * Math.PI); fadingInAudio.volume = Math.sin(p * 0.5 * Math.PI);
                if (p >= 1) { fadingOutAudio.pause(); fadingOutAudio.volume = 0; isCrossfading = false; mixingBadge.classList.remove('active'); fadingOutAudio = fadingInAudio = null; }
            }
        };

        const updateVisualLoop = () => {
            let a = activeLayer === 1 ? a1 : a2;
            if (a.duration && !isDragging) {
                let pct = (a.currentTime / a.duration) * 100;
                progressBar.value = pct; progressBar.style.setProperty('--progress', `${pct}%`);
                timeCurrentEl.textContent = formatTime(a.currentTime); timeTotalEl.textContent = formatTime(a.duration);
                let idx = currentLyrics.findIndex((l, i) => a.currentTime >= l.time - 0.1 && (!currentLyrics[i+1] || a.currentTime < currentLyrics[i+1].time));
                if (idx !== -1 && idx !== activeLyricIndex) { activeLyricIndex = idx; updateLyricsScroll(); }
            }
            requestAnimationFrame(updateVisualLoop);
        };

        const playTrack = (idx, manual = true) => {
            isCrossfading = false; mixingBadge.classList.remove('active'); if(fadingOutAudio) fadingOutAudio.pause();
            let nL = activeLayer === 1 ? 2 : 1, cA = activeLayer === 1 ? a1 : a2, nA = nL === 1 ? a1 : a2, nV = nL === 1 ? v1 : v2, t = playlist[idx];
            currentIdx = idx; nA.src = t.file; nV.src = t.video || ""; nA.currentTime = 0;
            updateUI(t, nL);
            if(manual) { cA.pause(); cA.volume = 0; nA.volume = 1; if(isPlaying) { nA.play(); if(t.video) nV.play(); } activeLayer = nL; }
        };

        const startAutomaticCrossfade = () => {
            isCrossfading = true; mixingBadge.classList.add('active'); fadeStartTime = Date.now();
            let nIdx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIdx + 1) % playlist.length;
            let nL = activeLayer === 1 ? 2 : 1, t = playlist[nIdx];
            fadingOutAudio = activeLayer === 1 ? a1 : a2; fadingInAudio = nL === 1 ? a1 : a2;
            let nV = nL === 1 ? v1 : v2; fadingInAudio.src = t.file; fadingInAudio.volume = 0; 
            if(t.video) { nV.src = t.video; nV.load(); nV.play(); }
            fadingInAudio.play(); currentIdx = nIdx; activeLayer = nL; updateUI(t, nL);
        };

        const updateUI = (t, L) => {
            document.getElementById('title').textContent = t.title; document.getElementById('artist').textContent = t.artist; document.getElementById('cover').src = t.cover;
            let a = L === 1 ? a1 : a2, ck = setInterval(() => { if(a.duration) { clearInterval(ck); loadLyrics(t, a.duration); } }, 100);
            if(t.video) { fallbackBg.classList.remove('active'); (L === 1 ? v1 : v2).classList.add('active'); (L === 1 ? v2 : v1).classList.remove('active'); }
            else { v1.classList.remove('active'); v2.classList.remove('active'); fallbackBg.src = t.cover; fallbackBg.classList.add('active'); }
            extractColors(t.cover);
        };

        const extractColors = (src) => {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = src;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 40; ctx.drawImage(img, 0,0,40,40);
                const d = ctx.getImageData(0,0,40,40).data; 
                let candidates = [];
                for(let i=0; i<d.length; i+=16) {
                    let r=d[i], g=d[i+1], b=d[i+2];
                    let max=Math.max(r,g,b), min=Math.min(r,g,b), l=(max+min)/510, s=(max-min)/(max||1);
                    let score = s * (1 - Math.abs(0.5 - l));
                    if(l > 0.15 && l < 0.85) candidates.push({rgb:[r,g,b], score, s});
                }
                candidates.sort((a,b) => b.score - a.score);
                let c1 = candidates[0]?.rgb || [255,255,255];
                let c2 = candidates.find(c => {
                    let diff = Math.abs(c.rgb[0]-c1[0]) + Math.abs(c.rgb[1]-c1[1]) + Math.abs(c.rgb[2]-c1[2]);
                    return diff > 100;
                })?.rgb || candidates[candidates.length-1]?.rgb || [120,120,120];
                document.documentElement.style.setProperty('--accent-1', `rgb(${c1[0]},${c1[1]},${c1[2]})`);
                document.documentElement.style.setProperty('--accent-2', `rgb(${c2[0]},${c2[1]},${c2[2]})`);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${c1[0]},${c1[1]},${c1[2]},0.4)`);
            };
        };

        const formatTime = s => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        playBtn.onclick = () => {
            initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
            if(isPlaying) { a1.pause(); a2.pause(); v1.pause(); v2.pause(); document.body.classList.add('player-paused'); }
            else { if(a1.volume > 0) a1.play(); if(a2.volume > 0) a2.play(); if(playlist[currentIdx].video) (activeLayer===1?v1:v2).play(); document.body.classList.remove('player-paused'); }
            isPlaying = !isPlaying; document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block'; document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        };

        document.getElementById('btn-lyrics').onclick = function() { isLyricsVisible = !isLyricsVisible; document.getElementById('lyrics-overlay').classList.toggle('show'); if(isLyricsVisible) updateLyricsScroll(); };
        document.getElementById('btn-next').onclick = () => playTrack((currentIdx+1)%playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIdx-1+playlist.length)%playlist.length);
        document.getElementById('btn-shuffle').onclick = function() { isShuffle = !isShuffle; this.classList.toggle('active'); };
        document.getElementById('btn-repeat').onclick = function() { isRepeat = !isRepeat; this.classList.toggle('active'); };
        progressBar.oninput = e => { isDragging = true; progressBar.style.setProperty('--progress', `${e.target.value}%`); };
        progressBar.onchange = e => { isDragging = false; let a = activeLayer === 1 ? a1 : a2; if(a.duration) a.currentTime = (e.target.value/100)*a.duration; };
        a1.ontimeupdate = a2.ontimeupdate = handleAudioTick;
        requestAnimationFrame(updateVisualLoop);
        playTrack(currentIdx, true);
    </script>
</body>
</html>
