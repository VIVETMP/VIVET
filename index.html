<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    
    <style>
        @property --accent-1 { syntax: '<color>'; inherits: true; initial-value: #ffffff; }
        @property --accent-2 { syntax: '<color>'; inherits: true; initial-value: #ffffff; }

        :root {
            --accent-1: #ffffff;
            --accent-2: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.2);
            --bg-dark: #000000;
            --apple-spring: cubic-bezier(0.25, 1, 0.4, 1);
            --apple-bouncy: cubic-bezier(0.34, 1.56, 0.64, 1);
            transition: --accent-1 1s ease, --accent-2 1s ease, --accent-glow 1s ease;
        }

        /* RESETEO Y TIPOGRAFÍA EDITORIAL */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale; 
        }

        body { 
            height: 100vh; width: 100vw; 
            background-color: var(--bg-dark); 
            overflow: hidden; position: relative;
        }

        /* FONDO CINEMÁTICO */
        .video-background, .image-fallback { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; opacity: 0; transition: opacity 2s ease; 
        }
        .video-background.active, .image-fallback.active { opacity: 0.9; z-index: 2; }
        .image-fallback { filter: blur(60px) brightness(0.5); transform: scale(1.1); }
        
        /* OVERLAY: Oscurece dramáticamente la izquierda y abajo para que los textos destaquen */
        .overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 40%, transparent 100%),
                        linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%, rgba(0,0,0,0.4) 100%);
            z-index: 3; pointer-events: none; 
        }

        /* UI DECONSTRUIDA - El contendor es invisible y abarca toda la pantalla */
        .player-app { 
            position: absolute; inset: 0; z-index: 10;
            animation: fadeInUI 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* HEADER BRANDING (Arriba Izquierda) */
        .brand-area {
            position: absolute; top: 40px; left: 50px;
            display: flex; align-items: center; gap: 12px;
            z-index: 20;
        }
        .brand-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 10px; font-weight: 800; letter-spacing: 8px; 
            color: #ffffff; text-transform: uppercase;
        }
        .site-logo { 
            width: 14px; height: 14px; background-color: #ffffff; 
            -webkit-mask: url('covers/LOGO.png') no-repeat center/contain; 
            mask: url('covers/LOGO.png') no-repeat center/contain; 
        }
        .eq-container { display: flex; align-items: flex-end; gap: 4px; height: 14px; margin-left: 10px; }
        .eq-bar { width: 3px; background: var(--accent-1); transition: height 0.3s ease; }
        body:not(.player-paused) .eq-bar { animation: eqBounce 0.8s alternate ease-in-out infinite; }
        body:not(.player-paused) .eq-bar:nth-child(2) { animation-delay: 0.2s; animation-duration: 0.6s; }
        body:not(.player-paused) .eq-bar:nth-child(3) { animation-delay: 0.4s; animation-duration: 0.7s; }
        @keyframes eqBounce { 0% { height: 4px; } 100% { height: 14px; } }

        /* BADGE FLOTANTE (Arriba Derecha) */
        .mixing-badge { 
            position: absolute; top: 40px; right: 50px;
            border: 1px solid var(--accent-1); color: var(--accent-1);
            padding: 6px 16px; font-size: 9px; font-weight: 700; letter-spacing: 3px;
            text-transform: uppercase; opacity: 0; transition: all 0.5s ease;
            box-shadow: 0 0 20px var(--accent-glow); z-index: 20;
        }
        .mixing-badge.active { opacity: 1; }

        /* PORTADA GIGANTE (Abajo Izquierda) */
        #artwork-wrapper { 
            position: absolute; bottom: 50px; left: 50px; 
            width: 280px; height: 280px; z-index: 20;
            transform: scale(var(--beat-scale)); transition: transform 0.1s linear;
        }
        .artwork-container { 
            width: 100%; height: 100%; overflow: hidden; 
            /* Diseño Sharp/Minimalista, sin bordes redondos */
            box-shadow: 20px 20px 60px rgba(0,0,0,0.8);
            transition: transform 0.8s var(--apple-spring), box-shadow 0.8s ease;
        }
        body.player-paused .artwork-container { transform: scale(0.92) rotate(-2deg); box-shadow: 10px 10px 30px rgba(0,0,0,0.5); }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }

        /* INFO DE LA CANCIÓN (Editorial Gigante) */
        .track-info { 
            position: absolute; bottom: 190px; left: 380px; right: 50px; z-index: 20;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .track-title { 
            font-size: 5vw; font-weight: 200; color: #ffffff; letter-spacing: -2px; 
            line-height: 1; text-transform: uppercase;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: color 1s ease;
        }
        .track-artist { 
            font-size: 14px; font-weight: 700; color: var(--accent-1); 
            letter-spacing: 5px; text-transform: uppercase; margin-top: 10px;
            text-shadow: 0 5px 20px var(--accent-glow);
        }

        /* LÍNEA DE PROGRESO (Ultra delgada) */
        .progress-area { 
            position: absolute; bottom: 130px; left: 380px; right: 50px; z-index: 20;
            display: flex; align-items: center; gap: 20px;
        }
        .time-info span { font-size: 11px; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; }
        .progress-bar { 
            flex: 1; -webkit-appearance: none; appearance: none; 
            height: 2px; background-color: rgba(255,255,255,0.1); outline: none; margin: 0;
            background-image: linear-gradient(90deg, var(--accent-1), var(--accent-2));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
            cursor: pointer; transition: height 0.3s ease, filter 0.3s;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .progress-bar:hover, .progress-bar:active { height: 6px; filter: brightness(1.5); }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 0; height: 0; }
        .progress-bar::-moz-range-thumb { width: 0; height: 0; border: none; background: transparent; }

        /* CONTROLES (Abajo a la derecha de la portada) */
        .controls-wrapper { 
            position: absolute; bottom: 50px; left: 380px; right: 50px; z-index: 20;
            display: flex; justify-content: space-between; align-items: center;
        }
        .controls { display: flex; align-items: center; gap: 35px; }
        .btn { 
            background: none!important; border: none!important; cursor: pointer; 
            color: #ffffff; display: flex; align-items: center; justify-content: center; padding: 0; 
            transition: transform 0.4s var(--apple-bouncy), color 0.3s ease, opacity 0.3s ease;
        }
        .btn:hover { transform: scale(1.15); color: var(--accent-1); filter: drop-shadow(0 0 15px var(--accent-glow)); } 
        .btn:active { transform: scale(0.85); opacity: 0.5; } 
        .btn svg { width: 22px; height: 22px; fill: currentColor; }
        
        /* Play Botón Minimalista Circular (Sin fondo) */
        .btn-play { 
            width: 65px; height: 65px; border-radius: 50%; 
            border: 1px solid rgba(255,255,255,0.3) !important;
            transition: all 0.5s var(--apple-bouncy);
        }
        .btn-play:hover { border-color: var(--accent-1) !important; background: rgba(255,255,255,0.05) !important; }
        .btn-play svg { width: 22px; height: 22px; }
        
        .btn-secondary { color: rgba(255,255,255,0.3); }
        .btn-secondary.active { color: var(--accent-1); filter: drop-shadow(0 0 10px var(--accent-glow)); }

        .btn-lyrics-right {
            border: 1px solid rgba(255,255,255,0.2) !important;
            padding: 12px 24px; border-radius: 30px;
            font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
        }
        .btn-lyrics-right.active { border-color: var(--accent-1) !important; color: var(--accent-1); }

        /* LETRAS: Flotando libremente en la pared derecha */
        .lyrics-overlay { 
            position: absolute; top: 100px; bottom: 300px; left: 380px; right: 50px; z-index: 15; 
            opacity: 0; pointer-events: none; 
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s var(--apple-spring);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .lyrics-content { width: 100%; height: 100%; overflow-y: auto; scrollbar-width: none; padding: 20px 0; }
        
        .lyric-line { 
            font-size: 32px; font-weight: 300; margin: 20px 0; text-align: left; 
            color: rgba(255,255,255,0.2); letter-spacing: -0.5px; line-height: 1.2; 
            transform-origin: left center; cursor: pointer;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.4, 1); 
        }
        .lyric-line.active { 
            color: var(--accent-1); font-size: 48px; font-weight: 700;
            transform: translateX(15px); text-shadow: 0 10px 30px var(--accent-glow);
        }

        /* SPLASH SCREEN */
        .splash-screen {
            position: fixed; inset: 0; background-color: #000000; z-index: 999999;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOutSplash 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; pointer-events: none; 
        }
        .splash-logo {
            width: 100px; height: 100px; background-color: #ffffff; 
            -webkit-mask: url('covers/LOGO.png') no-repeat center/contain; mask: url('covers/LOGO.png') no-repeat center/contain;
            animation: logoIntro 2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes logoIntro {
            0% { transform: scale(0.6); opacity: 0; filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            40% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 30px rgba(255,255,255,0.6)); }
            70% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
            100% { transform: scale(1.8); opacity: 0; filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
        }
        @keyframes fadeOutSplash { 0%, 75% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes fadeInUI { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="player-paused">

    <div class="splash-screen">
        <div class="splash-logo"></div>
    </div>

    <!-- FONDOS CINEMÁTICOS -->
    <img id="fallback-bg" class="image-fallback" src="" alt="Fondo" decoding="async">
    <video id="vid1" class="video-background active" crossorigin="anonymous" muted playsinline></video>
    <video id="vid2" class="video-background" crossorigin="anonymous" muted playsinline></video>
    <div class="overlay"></div>

    <!-- UI DECONSTRUIDA -->
    <div class="player-app">
        
        <!-- ELEMENTOS SUPERIORES -->
        <div class="brand-area">
            <div class="brand-container">
                <div class="site-logo"></div>
                <span>VIVET</span>
            </div>
            <div class="eq-container">
                <div class="eq-bar" style="height:4px;"></div>
                <div class="eq-bar" style="height:11px;"></div>
                <div class="eq-bar" style="height:6px;"></div>
            </div>
        </div>

        <div class="mixing-badge" id="mixing-badge">CROSSFADING</div>
        
        <!-- LETRAS (Flotan en el espacio superior derecho) -->
        <div id="lyrics-overlay" class="lyrics-overlay">
            <div id="lyrics-content" class="lyrics-content"></div>
        </div>

        <!-- PORTADA GIGANTE ANCLADA -->
        <div id="artwork-wrapper">
            <div class="artwork-container">
                <img id="cover" src="" crossorigin="anonymous" decoding="async">
            </div>
        </div>

        <!-- TIPOGRAFÍA MASIVA -->
        <div class="track-info">
            <div class="track-title" id="title">Loading...</div>
            <div class="track-artist" id="artist">VIVET Premium</div>
        </div>

        <!-- LÍNEA LÁSER DE PROGRESO -->
        <div class="progress-area">
            <div class="time-info"><span id="time-current">0:00</span></div>
            <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
            <div class="time-info"><span id="time-total">0:00</span></div>
        </div>

        <!-- CONTROLES -->
        <div class="controls-wrapper">
            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn btn-secondary" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
            
            <!-- Botón Tipográfico de Lyrics -->
            <button class="btn btn-secondary btn-lyrics-right" id="btn-lyrics">Lyrics</button>
        </div>
    </div>

    <!-- JS TOTALMENTE INTACTO -->
    <script>
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" },
            { title: "GANAS", artist: "KRIS R", cover: "covers/GANAS.jpg", file: "songs/GANAS.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774550862/GANAS_h8pqaj.mp4" },
            { title: "ETA RMX", artist: "ROA, DE LA ROSE, LUAR LA L, YAN BLOCK y OMAR COURTZ", cover: "covers/ETA REMIX.jpg", file: "songs/ETA REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774641439/ETA_REMIX_j5c5lh.mp4" }
        ];

        let currentIdx = 0, isPlaying = false, isDragging = false, isShuffle = false, isRepeat = false, isCrossfading = false;
        let fadeStartTime = 0, fadingOutAudio = null, fadingInAudio = null, activeLayer = 1;
        let currentLyrics =[], activeLyricIndex = -1, isLyricsVisible = false, lyricsRequestCount = 0;
        let colorCache = {}, audioCtx, analyser, dataArray;
        
        const CROSSFADE_TIME = 12;
        const a1 = new Audio();
        const a2 = new Audio();
        const v1 = document.getElementById('vid1');
        const v2 = document.getElementById('vid2');
        const fallbackBg = document.getElementById('fallback-bg');
        const progressBar = document.getElementById('progress');
        const timeCurrentEl = document.getElementById('time-current');
        const timeTotalEl = document.getElementById('time-total');
        const playBtn = document.getElementById('btn-play');
        const mixingBadge = document.getElementById('mixing-badge');
        
        a1.crossOrigin = "anonymous";
        a2.crossOrigin = "anonymous";

        const initAudioContext = () => { 
            if (audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            analyser = audioCtx.createAnalyser(); 
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount); 
            
            const s1 = audioCtx.createMediaElementSource(a1); 
            const s2 = audioCtx.createMediaElementSource(a2); 
            
            s1.connect(analyser); 
            s2.connect(analyser); 
            analyser.connect(audioCtx.destination); 
            
            drawEQ(); 
        };

        const drawEQ = () => { 
            analyser.getByteFrequencyData(dataArray); 
            document.documentElement.style.setProperty('--beat-scale', 1 + (dataArray[1] / 255 * 0.08)); 
            requestAnimationFrame(drawEQ); 
        };

        const parseLRC = lrc => {
            return lrc.split('\n').map(l => { 
                const m = l.match(/^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/); 
                return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() || "•••" } : null; 
            }).filter(Boolean).sort((a,b) => a.time - b.time);
        };

        const renderLyrics = () => { 
            const c = document.getElementById('lyrics-content'); 
            c.innerHTML = ''; 
            
            currentLyrics.forEach((l, i) => { 
                const d = document.createElement('div'); 
                d.className = 'lyric-line'; 
                d.textContent = l.text; 
                d.id = `lyric-${i}`; 
                d.onclick = () => { 
                    let a = activeLayer === 1 ? a1 : a2; 
                    if(a.duration) a.currentTime = l.time; 
                }; 
                c.appendChild(d); 
            }); 
        };

        const updateLyricsScroll = () => {
            const container = document.getElementById('lyrics-content');
            const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
            
            if (activeLyricIndex < 0 || !isLyricsVisible || !activeEl) return;
            
            document.querySelectorAll('.lyric-line').forEach((el, i) => {
                el.classList.toggle('active', i === activeLyricIndex);
            });
            
            container.scrollTo({ 
                top: activeEl.offsetTop - (container.clientHeight * 0.45), 
                behavior: 'smooth' 
            });
        };

        const loadLyrics = async (track, dur) => {
            lyricsRequestCount++; 
            let reqId = lyricsRequestCount; 
            currentLyrics =[]; 
            activeLyricIndex = -1;
            
            const content = document.getElementById('lyrics-content'); 
            content.innerHTML = '<div class="lyric-line" style="opacity:0.5;">Sincronizando...</div>';
            
            let artist = track.artist.split(/,|y|&/)[0].trim();
            let match = null;
            
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track.title)}&duration=${Math.round(dur)}`);
                if(res.ok) match = await res.json();
            } catch(e) {}
            
            if (reqId !== lyricsRequestCount) return;
            
            if(match?.syncedLyrics) { 
                currentLyrics = parseLRC(match.syncedLyrics); 
                renderLyrics(); 
            } else {
                content.innerHTML = '<div class="lyric-line" style="opacity:0.5;">Letra no disponible</div>';
            }
        };

        const handleAudioTick = (e) => {
            let a = activeLayer === 1 ? a1 : a2;
            let v = activeLayer === 1 ? v1 : v2;
            
            if (e.target === a && !isDragging && v.src && Math.abs(a.currentTime - v.currentTime) > 0.3) {
                v.currentTime = a.currentTime;
            }
            
            if (e.target === a && !isCrossfading && a.duration && (a.duration - a.currentTime <= CROSSFADE_TIME)) {
                startAutomaticCrossfade();
            }
            
            if (isCrossfading && fadingOutAudio && fadingInAudio) {
                let p = Math.min((Date.now() - fadeStartTime) / 1000 / CROSSFADE_TIME, 1);
                fadingOutAudio.volume = Math.cos(p * 0.5 * Math.PI); 
                fadingInAudio.volume = Math.sin(p * 0.5 * Math.PI);
                
                if (p >= 1) { 
                    fadingOutAudio.pause(); 
                    fadingOutAudio.volume = 0; 
                    isCrossfading = false; 
                    mixingBadge.classList.remove('active'); 
                    fadingOutAudio = fadingInAudio = null; 
                }
            }
        };

        const updateVisualLoop = () => {
            let a = activeLayer === 1 ? a1 : a2;
            
            if (a.duration && !isDragging) {
                let pct = (a.currentTime / a.duration) * 100;
                progressBar.value = pct; 
                progressBar.style.setProperty('--progress', `${pct}%`);
                
                timeCurrentEl.textContent = formatTime(a.currentTime); 
                timeTotalEl.textContent = formatTime(a.duration);
                
                let idx = currentLyrics.findIndex((l, i) => a.currentTime >= l.time - 0.1 && (!currentLyrics[i+1] || a.currentTime < currentLyrics[i+1].time));
                
                if (idx !== -1 && idx !== activeLyricIndex) { 
                    activeLyricIndex = idx; 
                    updateLyricsScroll(); 
                }
            }
            requestAnimationFrame(updateVisualLoop);
        };

        const playTrack = (idx, manual = true) => {
            isCrossfading = false; 
            mixingBadge.classList.remove('active'); 
            
            if(fadingOutAudio) fadingOutAudio.pause();
            
            let nL = activeLayer === 1 ? 2 : 1;
            let cA = activeLayer === 1 ? a1 : a2;
            let nA = nL === 1 ? a1 : a2;
            let nV = nL === 1 ? v1 : v2;
            let t = playlist[idx];
            
            currentIdx = idx; 
            nA.src = t.file; 
            nV.src = t.video || ""; 
            nA.currentTime = 0;
            
            updateUI(t, nL);
            
            if(manual) { 
                cA.pause(); 
                cA.volume = 0; 
                nA.volume = 1; 
                if(isPlaying) { 
                    nA.play(); 
                    if(t.video) nV.play(); 
                } 
                activeLayer = nL; 
            }
        };

        const startAutomaticCrossfade = () => {
            isCrossfading = true; 
            mixingBadge.classList.add('active'); 
            fadeStartTime = Date.now();
            
            let nIdx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIdx + 1) % playlist.length;
            let nL = activeLayer === 1 ? 2 : 1;
            let t = playlist[nIdx];
            
            fadingOutAudio = activeLayer === 1 ? a1 : a2; 
            fadingInAudio = nL === 1 ? a1 : a2;
            let nV = nL === 1 ? v1 : v2; 
            
            fadingInAudio.src = t.file; 
            fadingInAudio.volume = 0; 
            
            if(t.video) { 
                nV.src = t.video; 
                nV.load(); 
                nV.play(); 
            }
            
            fadingInAudio.play(); 
            currentIdx = nIdx; 
            activeLayer = nL; 
            updateUI(t, nL);
        };

        const updateUI = (t, L) => {
            document.getElementById('title').textContent = t.title; 
            document.getElementById('artist').textContent = t.artist; 
            document.getElementById('cover').src = t.cover;
            
            let a = L === 1 ? a1 : a2;
            let ck = setInterval(() => { 
                if(a.duration) { 
                    clearInterval(ck); 
                    loadLyrics(t, a.duration); 
                } 
            }, 100);
            
            if(t.video) { 
                fallbackBg.classList.remove('active'); 
                (L === 1 ? v1 : v2).classList.add('active'); 
                (L === 1 ? v2 : v1).classList.remove('active'); 
            } else { 
                v1.classList.remove('active'); 
                v2.classList.remove('active'); 
                fallbackBg.src = t.cover; 
                fallbackBg.classList.add('active'); 
            }
            extractColors(t.cover);
        };

        const extractColors = (src) => {
            const img = new Image(); 
            img.crossOrigin = "Anonymous"; 
            img.src = src;
            
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const ctx = cvs.getContext('2d'); 
                cvs.width = cvs.height = 40; 
                ctx.drawImage(img, 0, 0, 40, 40);
                
                const d = ctx.getImageData(0, 0, 40, 40).data; 
                let candidates =[];
                
                for(let i=0; i<d.length; i+=16) {
                    let r = d[i], g = d[i+1], b = d[i+2];
                    let max = Math.max(r,g,b), min = Math.min(r,g,b);
                    let l = (max+min)/510, s = (max-min)/(max||1);
                    let score = s * (1 - Math.abs(0.5 - l));
                    if(l > 0.15 && l < 0.85) candidates.push({rgb:[r,g,b], score, s});
                }
                
                candidates.sort((a,b) => b.score - a.score);
                let c1 = candidates[0]?.rgb ||[255, 255, 255];
                let c2 = candidates.find(c => {
                    let diff = Math.abs(c.rgb[0]-c1[0]) + Math.abs(c.rgb[1]-c1[1]) + Math.abs(c.rgb[2]-c1[2]);
                    return diff > 100;
                })?.rgb || candidates[candidates.length-1]?.rgb ||[120, 120, 120];
                
                document.documentElement.style.setProperty('--accent-1', `rgb(${c1[0]},${c1[1]},${c1[2]})`);
                document.documentElement.style.setProperty('--accent-2', `rgb(${c2[0]},${c2[1]},${c2[2]})`);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${c1[0]},${c1[1]},${c1[2]},0.5)`);
            };
        };

        const formatTime = s => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        playBtn.onclick = () => {
            initAudioContext(); 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            if(isPlaying) { 
                a1.pause(); 
                a2.pause(); 
                v1.pause(); 
                v2.pause(); 
                document.body.classList.add('player-paused'); 
            } else { 
                if(a1.volume > 0) a1.play(); 
                if(a2.volume > 0) a2.play(); 
                if(playlist[currentIdx].video) (activeLayer === 1 ? v1 : v2).play(); 
                document.body.classList.remove('player-paused'); 
            }
            
            isPlaying = !isPlaying; 
            document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block'; 
            document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        };

        document.getElementById('btn-lyrics').onclick = function() { 
            isLyricsVisible = !isLyricsVisible; 
            document.getElementById('lyrics-overlay').classList.toggle('show'); 
            this.classList.toggle('active');
            if(isLyricsVisible) updateLyricsScroll(); 
        };
        
        document.getElementById('btn-next').onclick = () => playTrack((currentIdx + 1) % playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIdx - 1 + playlist.length) % playlist.length);
        
        document.getElementById('btn-shuffle').onclick = function() { 
            isShuffle = !isShuffle; 
            this.classList.toggle('active'); 
        };
        
        document.getElementById('btn-repeat').onclick = function() { 
            isRepeat = !isRepeat; 
            this.classList.toggle('active'); 
        };
        
        progressBar.oninput = e => { 
            isDragging = true; 
            progressBar.style.setProperty('--progress', `${e.target.value}%`); 
        };
        
        progressBar.onchange = e => { 
            isDragging = false; 
            let a = activeLayer === 1 ? a1 : a2; 
            if(a.duration) a.currentTime = (e.target.value/100) * a.duration; 
        };
        
        a1.ontimeupdate = a2.ontimeupdate = handleAudioTick;
        requestAnimationFrame(updateVisualLoop);
        playTrack(currentIdx, true);
    </script>
</body>
</html>
