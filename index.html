<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    
    <style>
        @property --accent-color { syntax: '<color>'; inherits: true; initial-value: #ffffff; }

        :root {
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
            --lyric-inactive: rgba(255, 255, 255, 0.2);
            --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --beat-scale: 1;
            transition: --accent-color 0.8s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { height: 100vh; width: 100vw; background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; perspective: 1200px; }

        .video-background, .image-fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0; transition: opacity 1.5s ease, transform 1.5s ease; animation: bgMovement 25s infinite alternate ease-in-out; }
        @keyframes bgMovement { from { transform: scale(1.1) rotate(0.1deg); } to { transform: scale(1.25) rotate(-0.1deg); } }

        .video-background.active, .image-fallback.active { opacity: 0.5; z-index: 2; }
        .image-fallback { filter: blur(70px) brightness(0.4) saturate(1.6); }

        .overlay { position: absolute; inset: 0; background: radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.9) 100%); z-index: 3; }

        /* ANIMACIÓN DE FLOTACIÓN AL CONTENEDOR */
        .player-app { position: relative; z-index: 10; width: 100%; max-width: 420px; height: 100vh; max-height: 850px; padding: 40px 30px; display: flex; flex-direction: column; justify-content: space-between; transition: all 0.5s var(--spring-easing); animation: playerFloat 8s infinite ease-in-out; }
        @keyframes playerFloat { 0%, 100% { transform: translateY(0) rotateX(0); } 50% { transform: translateY(-10px) rotateX(2deg); } }

        .header { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 13px; font-weight: 800; letter-spacing: 4px; color: var(--accent-color); text-transform: uppercase; transition: color 0.5s ease; text-shadow: 0 0 20px var(--accent-glow); }

        .site-logo { width: 32px; height: 32px; background-color: var(--accent-color); -webkit-mask: url('covers/LOGO.png') no-repeat center / contain; mask: url('covers/LOGO.png') no-repeat center / contain; transition: all 0.3s var(--spring-easing); transform: scale(var(--beat-scale)); }
        
        body:not(.player-paused) .site-logo { animation: rotateLogo 12s infinite linear; }
        @keyframes rotateLogo { from { transform: scale(var(--beat-scale)) rotate(0deg); } to { transform: scale(var(--beat-scale)) rotate(360deg); } }

        .mini-eq { display: flex; align-items: flex-end; gap: 3px; height: 16px; width: 25px; }
        .eq-bar { flex: 1; background: var(--accent-color); border-radius: 1px; height: 3px; transition: height 0.15s ease, background-color 0.5s ease; box-shadow: 0 0 10px var(--accent-glow); }

        /* ARTWORK CON PULSO DINÁMICO */
        #artwork-wrapper { position: relative; margin-bottom: 25px; transform: scale(var(--beat-scale)); transition: transform 0.2s cubic-bezier(0.2, 0, 0.4, 2); will-change: transform; filter: drop-shadow(0 0 calc(var(--beat-scale) * 15px) var(--accent-glow)); }
        
        .artwork-container { width: 100%; aspect-ratio: 1; border-radius: 32px; overflow: hidden; position: relative; z-index: 5; box-shadow: 0 30px 60px rgba(0,0,0,0.8); transition: all 0.8s var(--spring-easing); }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s ease; }
        .artwork-container:hover img { transform: scale(1.1); }
        
        body.player-paused .artwork-container { transform: scale(0.85) rotateX(15deg) translateY(20px) !important; opacity: 0.6; filter: grayscale(0.5); }

        .lyrics-overlay { position: absolute; inset: 0; z-index: 100; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(50px) saturate(2); -webkit-backdrop-filter: blur(50px) saturate(2); display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transform: translateY(40px); transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        .lyrics-content { width: 100%; height: 100%; overflow-y: auto; padding: 65% 25px; scroll-behavior: smooth; scrollbar-width: none; -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%); }

        .lyric-line { font-size: clamp(22px, 7vw, 26px); font-weight: 800; line-height: 1.2; margin: 35px 0; transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); color: var(--lyric-inactive); filter: blur(4px); transform: translateY(30px) scale(0.85); opacity: 0.2; cursor: pointer; transform-origin: left center; }
        .lyric-line.active { color: #ffffff; filter: blur(0); transform: translateY(0) scale(1.1); opacity: 1; text-shadow: 0 0 30px var(--accent-glow); }
        .lyric-line.passed { color: rgba(255, 255, 255, 0.2); filter: blur(1px); transform: translateY(-20px) scale(0.95); opacity: 0.4; }

        .track-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .bop-animation { animation: trackBop 0.8s var(--spring-easing); }
        @keyframes trackBop { 0% { transform: translateX(-20px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

        .track-title { font-size: 28px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -1px; }
        .track-artist { font-size: 17px; font-weight: 500; color: var(--text-sub); }

        .progress-area { margin-bottom: 35px; cursor: pointer; }
        /* BARRA CON EFECTO SHIMMER */
        .progress-bar { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 10px; background: rgba(255,255,255,0.08); outline: none; background-image: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent), linear-gradient(to right, var(--accent-color), var(--accent-color)); background-size: 200% 100%, var(--progress, 0%) 100%; background-repeat: no-repeat; transition: height 0.3s var(--spring-easing); animation: shimmer 3s infinite linear; }
        @keyframes shimmer { 0% { background-position: -200% 0, 0 0; } 100% { background-position: 200% 0, 0 0; } }
        
        .progress-area:hover .progress-bar { height: 10px; box-shadow: 0 0 25px var(--accent-glow); }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px var(--accent-color); cursor: pointer; opacity: 0; transition: all 0.3s var(--spring-easing); border: 4px solid var(--accent-color); }
        .progress-area:hover .progress-bar::-webkit-slider-thumb { opacity: 1; transform: scale(1.2); }

        .controls { display: flex; align-items: center; justify-content: space-between; padding: 0 5px; }
        .btn { background: none; border: none; cursor: pointer; color: var(--accent-color); transition: all 0.4s var(--spring-easing); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .btn:hover { transform: translateY(-8px) scale(1.2); filter: drop-shadow(0 8px 20px var(--accent-glow)); }
        .btn:active { transform: scale(0.85); }
        
        .btn-play { width: 80px; height: 80px; border-radius: 50%; background: var(--accent-color); color: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px var(--accent-glow); transform: scale(var(--beat-scale)); }
        .btn-play svg { width: 38px; height: 38px; fill: #000; transition: transform 0.3s var(--spring-easing); }
        .btn-play:hover svg { transform: scale(1.1); }
        .btn-secondary { opacity: 0.4; transform: scale(0.9); }
        .btn-secondary.active { opacity: 1; filter: drop-shadow(0 0 15px var(--accent-color)); transform: scale(1.1); }

        .mixing-badge { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: var(--accent-color); color: #000; padding: 6px 18px; border-radius: 20px; font-size: 10px; font-weight: 900; opacity: 0; visibility: hidden; transition: 0.5s; box-shadow: 0 8px 20px var(--accent-glow); letter-spacing: 1px; }
        .mixing-badge.active { opacity: 1; visibility: visible; animation: pulseBadge 1s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes pulseBadge { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.15); } }
    </style>
</head>
<body class="player-paused">

    <img id="fallback-bg" class="image-fallback" src="" alt="Fondo">

                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>

                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>

            </div>
        </div>
    </div>

    <script>
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" }
        ];

        let currentIdx = 0, isPlaying = false, isDragging = false, isShuffle = false, isRepeat = false, isCrossfading = false, fadeStartTime = 0, fadingOutAudio = null, fadingInAudio = null, activeLayer = 1, currentLyrics = [], activeLyricIndex = -1, isLyricsVisible = false, lyricsRequestCount = 0, colorCache = {}, audioCtx, analyser, dataArray, source1, source2;
        const CROSSFADE_TIME = 12, a1 = new Audio(), a2 = new Audio(), v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2'), fallbackBg = document.getElementById('fallback-bg'), progressBar = document.getElementById('progress'), timeCurrentEl = document.getElementById('time-current'), timeTotalEl = document.getElementById('time-total'), playBtn = document.getElementById('btn-play'), mixingBadge = document.getElementById('mixing-badge'), trackAnimator = document.getElementById('track-animator');
        a1.crossOrigin = a2.crossOrigin = "anonymous";

        const initAudioContext = () => { if (audioCtx) return; audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; dataArray = new Uint8Array(analyser.frequencyBinCount); source1 = audioCtx.createMediaElementSource(a1); source2 = audioCtx.createMediaElementSource(a2); source1.connect(analyser); source2.connect(analyser); analyser.connect(audioCtx.destination); drawEQ(); };

        const drawEQ = () => { analyser.getByteFrequencyData(dataArray); document.querySelectorAll('.eq-bar').forEach((bar, i) => bar.style.height = Math.max(3, (dataArray[i * 2] / 255) * 16) + 'px'); document.documentElement.style.setProperty('--beat-scale', 1 + (dataArray[1] / 255 * 0.05)); requestAnimationFrame(drawEQ); };

        const parseLRC = lrc => lrc.split('\n').map(l => { const m = l.match(/^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/); return m ? { time: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() || "•••" } : null; }).filter(Boolean).sort((a,b) => a.time - b.time);

        const renderLyrics = () => { const c = document.getElementById('lyrics-content'); c.innerHTML = ''; currentLyrics.forEach((l, i) => { const d = document.createElement('div'); d.className = 'lyric-line'; d.textContent = l.text; d.id = `lyric-${i}`; d.onclick = () => { let a = activeLayer === 1 ? a1 : a2; if(a.duration) a.currentTime = l.time; }; c.appendChild(d); }); };

        const updateLyricsScroll = () => {
            const container = document.getElementById('lyrics-content'), activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
            if (activeLyricIndex < 0 || !isLyricsVisible || !activeEl) return;
            document.querySelectorAll('.lyric-line').forEach((el, i) => { el.classList.toggle('passed', i < activeLyricIndex); el.classList.toggle('active', i === activeLyricIndex); });
            container.scrollTo({ top: activeEl.offsetTop - (container.clientHeight * 0.42), behavior: 'smooth' });
        };

        const loadLyrics = async (track, dur) => {
            lyricsRequestCount++; let reqId = lyricsRequestCount; currentLyrics = []; activeLyricIndex = -1;
            const content = document.getElementById('lyrics-content'); content.innerHTML = '<div class="lyric-line" style="opacity:0.5; text-align:center;">Sincronizando...</div>';
            let artist = track.artist.split(/,|y|&/)[0].trim(), match = null;
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(artist)}&track_name=${encodeURIComponent(track.title)}&duration=${Math.round(dur)}`);
                if(res.ok) match = await res.json();
                if(!match) { const s = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(artist)}`); const r = await s.json(); if(r.length) match = r[0]; }
            } catch(e){}
            if (reqId !== lyricsRequestCount) return;
            if(match?.syncedLyrics) { currentLyrics = parseLRC(match.syncedLyrics); renderLyrics(); } 
            else if(match?.plainLyrics) { content.innerHTML = ''; match.plainLyrics.split('\n').forEach(l => { const d = document.createElement('div'); d.className = 'lyric-line active'; d.style.color = '#fff'; d.textContent = l || "•••"; content.appendChild(d); }); }
            else content.innerHTML = '<div class="lyric-line" style="opacity:0.5; text-align:center;">Letra no disponible</div>';
        };

        const handleAudioTick = (e) => {
            let a = activeLayer === 1 ? a1 : a2, v = activeLayer === 1 ? v1 : v2;
            if (e.target === a && !isDragging && v.src && Math.abs(a.currentTime - v.currentTime) > 0.3) v.currentTime = a.currentTime;
            if (e.target === a && !isCrossfading && a.duration && (a.duration - a.currentTime <= CROSSFADE_TIME)) startAutomaticCrossfade();
            if (isCrossfading && fadingOutAudio && fadingInAudio) {
                let p = Math.min((Date.now() - fadeStartTime) / 1000 / CROSSFADE_TIME, 1);
                fadingOutAudio.volume = Math.cos(p * 0.5 * Math.PI); fadingInAudio.volume = Math.sin(p * 0.5 * Math.PI);
                if (p >= 1) { fadingOutAudio.pause(); fadingOutAudio.volume = 0; isCrossfading = false; mixingBadge.classList.remove('active'); fadingOutAudio = fadingInAudio = null; }
            }
        };

        const updateVisualLoop = () => {
            let a = activeLayer === 1 ? a1 : a2;
            if (a.duration && !isDragging) {
                let pct = (a.currentTime / a.duration) * 100;
                progressBar.value = pct; progressBar.style.setProperty('--progress', `${pct}%`);
                timeCurrentEl.textContent = formatTime(a.currentTime); timeTotalEl.textContent = formatTime(a.duration);
                let idx = currentLyrics.findIndex((l, i) => a.currentTime >= l.time - 0.1 && (!currentLyrics[i+1] || a.currentTime < currentLyrics[i+1].time));
                if (idx !== -1 && idx !== activeLyricIndex) { activeLyricIndex = idx; updateLyricsScroll(); }
            }
            requestAnimationFrame(updateVisualLoop);
        };

        const playTrack = (idx, manual = true) => {
            isCrossfading = false; mixingBadge.classList.remove('active'); if(fadingOutAudio) fadingOutAudio.pause();
            let nL = activeLayer === 1 ? 2 : 1, cA = activeLayer === 1 ? a1 : a2, nA = nL === 1 ? a1 : a2, nV = nL === 1 ? v1 : v2, t = playlist[idx];
            currentIdx = idx; nA.src = t.file; nV.src = t.video || ""; nA.currentTime = 0;
            updateUI(t, nL);
            if(manual) { cA.pause(); cA.volume = 0; nA.volume = 1; if(isPlaying) { nA.play(); if(t.video) nV.play(); } activeLayer = nL; }
        };

        const startAutomaticCrossfade = () => {
            isCrossfading = true; mixingBadge.classList.add('active'); fadeStartTime = Date.now();
            let nIdx = isShuffle ? Math.floor(Math.random() * playlist.length) : (currentIdx + 1) % playlist.length;
            let nL = activeLayer === 1 ? 2 : 1, t = playlist[nIdx];
            fadingOutAudio = activeLayer === 1 ? a1 : a2; fadingInAudio = nL === 1 ? a1 : a2;
            let nV = nL === 1 ? v1 : v2; fadingInAudio.src = t.file; fadingInAudio.volume = 0; 
            if(t.video) { nV.src = t.video; nV.load(); nV.play(); }
            fadingInAudio.play(); currentIdx = nIdx; activeLayer = nL; updateUI(t, nL);
        };

        const updateUI = (t, L) => {
            trackAnimator.classList.remove('bop-animation'); void trackAnimator.offsetWidth; trackAnimator.classList.add('bop-animation');
            document.getElementById('title').textContent = t.title; document.getElementById('artist').textContent = t.artist; document.getElementById('cover').src = t.cover;
            let a = L === 1 ? a1 : a2, ck = setInterval(() => { if(a.duration) { clearInterval(ck); loadLyrics(t, a.duration); } }, 100);
            if(t.video) { fallbackBg.classList.remove('active'); (L === 1 ? v1 : v2).classList.add('active'); (L === 1 ? v2 : v1).classList.remove('active'); }
            else { v1.classList.remove('active'); v2.classList.remove('active'); fallbackBg.src = t.cover; fallbackBg.classList.add('active'); }
            extractColor(t.cover);
        };

        const extractColor = (src) => {
            if(colorCache[src]) return applyColor(colorCache[src]);
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = src;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 30; ctx.drawImage(img, 0,0,30,30);
                const d = ctx.getImageData(0,0,30,30).data; let best = [255,255,255], maxS = -1;
                for(let i=0; i<d.length; i+=4) {
                    let r=d[i], g=d[i+1], b=d[i+2], max=Math.max(r,g,b), min=Math.min(r,g,b), s=(max-min)/(max||1)*max;
                    if(s > maxS && max < 230 && max > 40) { maxS = s; best = [r,g,b]; }
                }
                let lum = (best[0]*299 + best[1]*587 + best[2]*114)/1000;
                if(lum < 110) best = best.map(v => Math.min(255, v * (150/Math.max(lum,1))));
                colorCache[src] = best; applyColor(best);
            };
        };

        const applyColor = ([r,g,b]) => { document.documentElement.style.setProperty('--accent-color', `rgb(${r},${g},${b})`); document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.6)`); };
        const formatTime = s => isNaN(s) ? "0:00" : `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        playBtn.onclick = () => {
            initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
            let a1_v = a1.volume > 0, a2_v = a2.volume > 0, t = playlist[currentIdx];
            if(isPlaying) { a1.pause(); a2.pause(); v1.pause(); v2.pause(); document.body.classList.add('player-paused'); }
            else { if(a1_v) a1.play(); if(a2_v) a2.play(); if(t.video) (activeLayer===1?v1:v2).play(); document.body.classList.remove('player-paused'); }
            isPlaying = !isPlaying; document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block'; document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        };

        document.getElementById('btn-lyrics').onclick = function() { isLyricsVisible = !isLyricsVisible; this.classList.toggle('active'); document.getElementById('lyrics-overlay').classList.toggle('show'); if(isLyricsVisible) updateLyricsScroll(); };
        document.getElementById('btn-next').onclick = () => playTrack(isShuffle ? Math.floor(Math.random()*playlist.length) : (currentIdx+1)%playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIdx-1+playlist.length)%playlist.length);
        document.getElementById('btn-shuffle').onclick = function() { isShuffle = !isShuffle; this.classList.toggle('active'); };
        document.getElementById('btn-repeat').onclick = function() { isRepeat = !isRepeat; this.classList.toggle('active'); };
        progressBar.oninput = e => { isDragging = true; progressBar.style.setProperty('--progress', `${e.target.value}%`); };
        progressBar.onchange = e => { isDragging = false; let a = activeLayer === 1 ? a1 : a2; if(a.duration) a.currentTime = (e.target.value/100)*a.duration; };
        a1.ontimeupdate = a2.ontimeupdate = handleAudioTick;
        
        requestAnimationFrame(updateVisualLoop);
        playTrack(currentIdx, true);
    </script>
</body>
</html>
