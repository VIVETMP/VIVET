<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Premium Player</title>
    <style>
        :root {
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh; width: 100vw;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- VIDEOS DE FONDO --- */
        .video-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0; 
            filter: brightness(0.7) saturate(1.2); 
            transition: opacity 1s ease-in-out;
        }
        .video-background.active { opacity: 1; z-index: 2; }
        
        .overlay { 
            position: absolute; inset: 0; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.9) 100%); 
            z-index: 3; 
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .player-app {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
            padding: 40px 30px; display: flex; flex-direction: column;
            justify-content: space-between;
        }

        /* --- HEADER Y LOGO --- */
        .header { 
            display: flex; justify-content: center; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--accent-color); 
            text-transform: uppercase; margin-bottom: 20px; transition: color 0.5s; position: relative; 
        }

        .site-logo {
            width: 32px; height: 32px;
            background-color: var(--accent-color);
            -webkit-mask-image: url('covers/LOGO.png'); -webkit-mask-size: contain; -webkit-mask-repeat: no-repeat; -webkit-mask-position: center;
            mask-image: url('covers/LOGO.png'); mask-size: contain; mask-repeat: no-repeat; mask-position: center;
            transition: background-color 0.5s ease;
        }
        
        /* EQ Visualizer mini */
        .mini-eq { display: flex; align-items: flex-end; gap: 3px; height: 12px; opacity: 0; transition: opacity 0.3s; }
        body:not(.player-paused) .mini-eq { opacity: 1; }
        .eq-bar { width: 3px; background-color: var(--accent-color); border-radius: 2px; animation: eqBounce 0.5s infinite alternate ease-in-out; }
        @keyframes eqBounce { 0% { height: 3px; } 100% { height: 12px; } }

        /* BADGE MIXING */
        .mixing-badge {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background-color: var(--accent-color); color: #000;
            padding: 4px 12px; border-radius: 12px; font-size: 10px; font-weight: 800;
            box-shadow: 0 0 15px var(--accent-glow); opacity: 0; visibility: hidden; transition: 0.4s;
        }
        .mixing-badge.active { opacity: 1; visibility: visible; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(0.95); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(0.95); } }

        /* --- PORTADA Y LETRAS --- */
        #artwork-wrapper { position: relative; margin-bottom: 30px; }
        .artwork-container {
            width: 100%; aspect-ratio: 1; border-radius: 24px; overflow: hidden;
            position: relative; z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px var(--accent-glow);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center bottom;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        .player-paused .artwork-container { transform: scale(0.85); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        /* Letras Overlay */
        .lyrics-overlay {
            position: absolute; inset: 0; z-index: 15;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; overflow: hidden;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; }
        .lyrics-content { width: 100%; height: 100%; overflow-y: auto; padding: 60% 20px; text-align: center; scroll-behavior: smooth; scrollbar-width: none; }
        .lyrics-content::-webkit-scrollbar { display: none; }
        .lyric-line { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.3); margin: 20px 0; transition: all 0.4s; cursor: pointer; }
        .lyric-line.active { font-size: 26px; font-weight: 800; color: var(--accent-color); transform: scale(1.05); text-shadow: 0 0 20px var(--accent-glow); }

        /* --- INFO TRACK --- */
        .track-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .track-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 16px; font-weight: 500; color: var(--text-sub); }

        /* --- PROGRESS BAR --- */
        .progress-area { margin-bottom: 30px; }
        .progress-bar {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.2); outline: none;
            background-image: linear-gradient(var(--accent-color), var(--accent-color));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
        }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--accent-glow); }
        .time-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; font-weight: 700; color: var(--text-sub); }

        /* --- CONTROLES --- */
        .controls { display: flex; align-items: center; justify-content: space-between; }
        .btn { background: none; border: none; cursor: pointer; color: var(--accent-color); transition: 0.3s; display: flex; align-items: center; }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }
        .btn:active { transform: scale(0.9); }
        
        .btn-play {
            width: 70px; height: 70px; border-radius: 50%; background: var(--accent-color); color: #000;
            justify-content: center; box-shadow: 0 10px 25px var(--accent-glow);
        }
        .btn-play svg { width: 32px; height: 32px; fill: #000; }
        .btn-secondary.active { color: var(--accent-color); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .btn-secondary.active::after { content: '•'; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%); }
        .btn-secondary { position: relative; opacity: 0.7; }
        .btn-secondary.active { opacity: 1; }

    </style>
</head>
<body class="player-paused">

    <video id="vid1" class="video-background active" muted playsinline loop></video>
    <video id="vid2" class="video-background" muted playsinline loop></video>
    <div class="overlay"></div>

    <div class="player-app">
        <div class="header">
            <div class="mixing-badge" id="mixing-badge">MIXING...</div>
            <div class="site-logo"></div> V I V E T
            <div class="mini-eq">
                <div class="eq-bar" style="animation-delay: 0.1s;"></div>
                <div class="eq-bar" style="animation-delay: 0.3s;"></div>
                <div class="eq-bar" style="animation-delay: 0s;"></div>
            </div>
        </div>
        
        <div id="artwork-wrapper">
            <div class="artwork-container">
                <img id="cover" src="" alt="Portada" crossorigin="anonymous">
                <div id="lyrics-overlay" class="lyrics-overlay">
                    <div id="lyrics-content" class="lyrics-content"></div>
                </div>
            </div>
        </div>

        <div>
            <div class="track-info">
                <div style="flex:1; overflow:hidden;">
                    <div class="track-title" id="title">Cargando...</div>
                    <div class="track-artist" id="artist">VIVET Music</div>
                </div>
                <button class="btn btn-secondary" id="btn-lyrics">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
                </button>
            </div>

            <div class="progress-area">
                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 5h3v14H6zm9 0h3v14h-3z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn btn-secondary" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MVDNIGHT, MORA, ROA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" }
        ];

        let currentIdx = 0, isPlaying = false, isDragging = false, isShuffle = false, isRepeat = false;
        let activeLayer = 1, isCrossfading = false, fadeStartTime = 0;
        const CROSSFADE_TIME = 12;

        const a1 = new Audio(), a2 = new Audio();
        const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
        const progressBar = document.getElementById('progress');
        const playBtn = document.getElementById('btn-play');
        const mixingBadge = document.getElementById('mixing-badge');

        let currentLyrics = [], activeLyricIndex = -1, isLyricsVisible = false, lyricsRequestCount = 0;

        // --- BÚSQUEDA DE LETRAS POR DURACIÓN, ARTISTA Y NOMBRE ---
        async function loadLyrics(track, audioDuration) {
            lyricsRequestCount++;
            let currentReq = lyricsRequestCount;
            currentLyrics = []; activeLyricIndex = -1;
            const content = document.getElementById('lyrics-content');
            content.innerHTML = '<div class="lyric-line" style="margin-top:40%;">Buscando letra exacta...</div>';

            // Limpieza básica
            let cleanArtist = track.artist.split(',')[0].split(' y ')[0].trim();
            let cleanTitle = track.title.split('(')[0].trim();
            let duration = Math.round(audioDuration);

            // 1. Intento por duración exacta (API GET)
            try {
                const exactUrl = `https://lrclib.net/api/get?artist_name=${encodeURIComponent(cleanArtist)}&track_name=${encodeURIComponent(cleanTitle)}&duration=${duration}`;
                const res = await fetch(exactUrl);
                if (res.ok) {
                    const data = await res.json();
                    if (currentReq !== lyricsRequestCount) return;
                    if (data.syncedLyrics) { currentLyrics = parseLRC(data.syncedLyrics); renderLyrics(); return; }
                }
            } catch(e) {}

            // 2. Fallback por búsqueda general filtrada
            try {
                const searchUrl = `https://lrclib.net/api/search?q=${encodeURIComponent(cleanTitle + " " + cleanArtist)}`;
                const res = await fetch(searchUrl);
                const data = await res.json();
                if (currentReq !== lyricsRequestCount) return;

                let bestMatch = null; let bestScore = -1;
                data.forEach(item => {
                    let score = 0;
                    let diff = Math.abs(item.duration - audioDuration);
                    if (diff <= 3) score += 1000;
                    else if (diff <= 10) score += 100;
                    if (item.syncedLyrics) score += 500;
                    if (score > bestScore) { bestScore = score; bestMatch = item; }
                });

                if (bestMatch && bestScore > 0) {
                    if (bestMatch.syncedLyrics) { currentLyrics = parseLRC(bestMatch.syncedLyrics); renderLyrics(); }
                    else if (bestMatch.plainLyrics) renderPlainLyrics(bestMatch.plainLyrics);
                } else {
                    content.innerHTML = '<div class="lyric-line" style="margin-top:40%;">Letra no encontrada</div>';
                }
            } catch(e) { content.innerHTML = '<div class="lyric-line" style="margin-top:40%;">Error de conexión</div>'; }
        }

        function parseLRC(lrc) {
            const lines = lrc.split('\n'); const result = [];
            const regex = /^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/;
            lines.forEach(line => {
                const match = line.match(regex);
                if (match) result.push({ time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() || "•••" });
            });
            return result;
        }

        function renderLyrics() {
            const content = document.getElementById('lyrics-content'); content.innerHTML = '';
            currentLyrics.forEach((lyric, i) => {
                const div = document.createElement('div'); div.className = 'lyric-line';
                div.textContent = lyric.text; div.id = `lyric-${i}`;
                div.onclick = () => { 
                    let activeA = activeLayer === 1 ? a1 : a2; 
                    let activeV = activeLayer === 1 ? v1 : v2;
                    activeA.currentTime = lyric.time; activeV.currentTime = lyric.time;
                };
                content.appendChild(div);
            });
        }

        function renderPlainLyrics(text) {
            const content = document.getElementById('lyrics-content');
            content.innerHTML = text.split('\n').map(l => `<div class="lyric-line active">${l}</div>`).join('');
            currentLyrics = [];
        }

        // --- LÓGICA DEL REPRODUCTOR ---
        function playTrack(idx, isManual = true) {
            if (isCrossfading) { isCrossfading = false; mixingBadge.classList.remove('active'); }
            
            let nextLayer = activeLayer === 1 ? 2 : 1;
            let currentA = activeLayer === 1 ? a1 : a2; let currentV = activeLayer === 1 ? v1 : v2;
            let nextA = nextLayer === 1 ? a1 : a2; let nextV = nextLayer === 1 ? v1 : v2;

            currentIdx = idx; let track = playlist[currentIdx];
            nextA.src = track.file; nextV.src = track.video;
            nextA.volume = 1; nextA.currentTime = 0; nextV.currentTime = 0;

            if (isManual) {
                currentA.pause(); currentV.pause();
                if (isPlaying) { nextA.play(); nextV.play(); }
                activeLayer = nextLayer;
                updateUI(track, nextLayer);
            }
        }

        function startCrossfade() {
            isCrossfading = true; mixingBadge.classList.add('active');
            let nextIdx = isShuffle ? Math.floor(Math.random()*playlist.length) : (currentIdx + 1) % playlist.length;
            let nextLayer = activeLayer === 1 ? 2 : 1;
            let fadingOutA = activeLayer === 1 ? a1 : a2; let fadingInA = nextLayer === 1 ? a1 : a2;
            let nextV = nextLayer === 1 ? v1 : v2;
            let track = playlist[nextIdx];

            fadingInA.src = track.file; nextV.src = track.video;
            fadingInA.volume = 0; fadingInA.play(); nextV.play();
            fadeStartTime = Date.now();
            currentIdx = nextIdx; activeLayer = nextLayer;
            updateUI(track, nextLayer);
        }

        function updateUI(track, layerNum) {
            document.getElementById('title').textContent = track.title;
            document.getElementById('artist').textContent = track.artist;
            document.getElementById('cover').src = track.cover;

            if (layerNum === 1) { v1.classList.add('active'); v2.classList.remove('active'); }
            else { v2.classList.add('active'); v1.classList.remove('active'); }

            let activeA = layerNum === 1 ? a1 : a2;
            let check = setInterval(() => {
                if (activeA.duration) { clearInterval(check); loadLyrics(track, activeA.duration); }
            }, 200);

            extractColor(track.cover);
        }

        function handleTimeUpdate(e) {
            let activeA = activeLayer === 1 ? a1 : a2;
            if (e.target !== activeA) return;

            if (!isDragging) {
                let pct = (activeA.currentTime / activeA.duration) * 100;
                progressBar.value = pct;
                progressBar.style.setProperty('--progress', `${pct}%`);
                document.getElementById('time-current').textContent = formatTime(activeA.currentTime);
                document.getElementById('time-total').textContent = formatTime(activeA.duration);
            }

            // Crossfade trigger
            if (!isCrossfading && activeA.duration - activeA.currentTime <= CROSSFADE_TIME && activeA.currentTime > 10) {
                startCrossfade();
            }

            // Mixing logic
            if (isCrossfading) {
                let elapsed = (Date.now() - fadeStartTime) / 1000;
                let progress = Math.min(elapsed / CROSSFADE_TIME, 1);
                let fadingOutA = activeLayer === 2 ? a1 : a2;
                let fadingInA = activeLayer === 1 ? a1 : a2;
                fadingOutA.volume = 1 - progress;
                fadingInA.volume = progress;
                if (progress >= 1) { isCrossfading = false; fadingOutA.pause(); mixingBadge.classList.remove('active'); }
            }

            // Sync Lyrics
            if (currentLyrics.length > 0) {
                let idx = currentLyrics.findIndex((l, i) => activeA.currentTime >= l.time && (!currentLyrics[i+1] || activeA.currentTime < currentLyrics[i+1].time));
                if (idx !== -1 && idx !== activeLyricIndex) {
                    activeLyricIndex = idx;
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    let activeEl = document.getElementById(`lyric-${idx}`);
                    if (activeEl) {
                        activeEl.classList.add('active');
                        if (isLyricsVisible) {
                            let container = document.getElementById('lyrics-content');
                            container.scrollTo({ top: activeEl.offsetTop - container.clientHeight / 2, behavior: 'smooth' });
                        }
                    }
                }
            }
        }

        function formatTime(s) {
            let m = Math.floor(s/60); let sec = Math.floor(s%60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function extractColor(src) {
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 1; canvas.height = 1; ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0,0,1,1).data;
                document.documentElement.style.setProperty('--accent-color', `rgb(${r},${g},${b})`);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.4)`);
            };
            img.src = src;
        }

        // EVENTOS
        playBtn.onclick = () => {
            let activeA = activeLayer === 1 ? a1 : a2; let activeV = activeLayer === 1 ? v1 : v2;
            if (isPlaying) { a1.pause(); a2.pause(); v1.pause(); v2.pause(); document.body.classList.add('player-paused'); }
            else { activeA.play(); activeV.play(); document.body.classList.remove('player-paused'); }
            isPlaying = !isPlaying;
            document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block';
            document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        };

        document.getElementById('btn-next').onclick = () => playTrack((currentIdx + 1) % playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIdx - 1 + playlist.length) % playlist.length);
        document.getElementById('btn-lyrics').onclick = () => {
            isLyricsVisible = !isLyricsVisible;
            document.getElementById('lyrics-overlay').classList.toggle('show');
            document.getElementById('btn-lyrics').classList.toggle('active');
        };

        a1.ontimeupdate = handleTimeUpdate; a2.ontimeupdate = handleTimeUpdate;
        
        progressBar.oninput = () => isDragging = true;
        progressBar.onchange = (e) => {
            isDragging = false;
            let activeA = activeLayer === 1 ? a1 : a2; let activeV = activeLayer === 1 ? v1 : v2;
            let time = (e.target.value / 100) * activeA.duration;
            activeA.currentTime = time; activeV.currentTime = time;
        };

        // Inicio
        playTrack(0, true);
    </script>
</body>
</html>
