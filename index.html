<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <style>
        :root {
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.3);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: "SF Pro Display", -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh; width: 100vw; background: var(--bg-dark);
            color: var(--text-main); display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- VIDEOS DE FONDO --- */
        .video-background {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0; 
            filter: brightness(0.4) saturate(1.4) blur(8px);
            transform: scale(1.1); transition: opacity 1.5s ease-in-out;
        }
        .video-background.active { opacity: 1; z-index: 2; }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent, #000 90%); z-index: 3; }

        /* --- UI CONTAINER --- */
        .player-app {
            position: relative; z-index: 10; width: 100%; max-width: 400px;
            height: 90vh; display: flex; flex-direction: column; justify-content: space-between; padding: 25px;
        }

        /* HEADER */
        .header { text-align: center; font-size: 10px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; opacity: 0.6; }
        .mixing-badge {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            background: var(--accent-color); color: #000; padding: 4px 12px;
            border-radius: 20px; font-size: 9px; opacity: 0; transition: 0.4s;
        }
        .mixing-badge.active { opacity: 1; top: -30px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: translateX(-50%) scale(0.9); } to { transform: translateX(-50%) scale(1); } }

        /* ARTWORK */
        .artwork-wrapper { position: relative; width: 100%; aspect-ratio: 1; margin: 20px 0; }
        .artwork-container {
            width: 100%; height: 100%; border-radius: 35px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 40px var(--accent-glow);
            transition: var(--transition);
        }
        .player-paused .artwork-container { transform: scale(0.85); opacity: 0.5; }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }

        /* LETRAS */
        .lyrics-overlay {
            position: absolute; inset: 0; z-index: 15; background: rgba(0,0,0,0.5);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 35px; opacity: 0; pointer-events: none; transition: var(--transition);
        }
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; }
        .lyrics-content { 
            width: 100%; height: 100%; overflow-y: auto; padding: 60% 25px; 
            scroll-behavior: smooth; mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent);
            -webkit-mask-image: linear-gradient(transparent, #000 20%, #000 80%, transparent);
        }
        .lyrics-content::-webkit-scrollbar { display: none; }
        .lyric-line { font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.2); margin: 25px 0; transition: 0.4s; }
        .lyric-line.active { color: var(--accent-color); transform: scale(1.05); text-shadow: 0 0 15px var(--accent-glow); }

        /* TRACK INFO */
        .track-title { font-size: 26px; font-weight: 800; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { font-size: 15px; color: var(--text-sub); font-weight: 500; }

        /* PROGRESS */
        .progress-container { margin: 30px 0; }
        .progress-bar {
            -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 2px; outline: none; cursor: pointer;
            background-image: linear-gradient(var(--accent-color), var(--accent-color));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
        }
        .progress-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--accent-color); }
        .time-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 10px; font-weight: 900; color: var(--text-sub); }

        /* CONTROLES */
        .controls { display: flex; justify-content: space-between; align-items: center; }
        .btn { background: none; border: none; cursor: pointer; color: var(--text-main); transition: 0.3s; }
        .btn svg { width: 30px; height: 30px; fill: currentColor; }
        .play-btn { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .play-btn svg { width: 35px; height: 35px; fill: #000; }
        .secondary { opacity: 0.4; transform: scale(0.8); }
        .secondary.active { opacity: 1; color: var(--accent-color); transform: scale(1); }
    </style>
</head>
<body class="player-paused">

    <video id="vid1" class="video-background active" muted playsinline loop></video>
    <video id="vid2" class="video-background" muted playsinline loop></video>
    <div class="overlay"></div>

    <div class="player-app">
        <div class="header">
            <div class="mixing-badge" id="mixing-badge">NON-STOP MIXING</div>
            VIVET PREMIUM
        </div>

        <div class="artwork-wrapper">
            <div class="artwork-container">
                <img id="cover" src="" crossorigin="anonymous">
                <div id="lyrics-overlay" class="lyrics-overlay">
                    <div id="lyrics-content" class="lyrics-content"></div>
                </div>
            </div>
        </div>

        <div class="info-section">
            <h1 class="track-title" id="title">Cargando...</h1>
            <p class="track-artist" id="artist">VIVET Music</p>

            <div class="progress-container">
                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <button class="btn" id="btn-lyrics" style="font-size: 9px; font-weight: 900; letter-spacing: 1px;">LYRICS</button>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn secondary" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn play-btn" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 5h3v14H6zm9 0h3v14h-3z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn secondary" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MVDNIGHT, MORA, ROA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" }
        ];

        let currentIdx = 0, isPlaying = false, activeLayer = 1, isCrossfading = false, isLyricsVisible = false;
        let currentLyrics = [], activeLyricIndex = -1;
        const CROSSFADE_TIME = 12;

        const a1 = new Audio(), a2 = new Audio();
        const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
        const progressBar = document.getElementById('progress');
        const mixingBadge = document.getElementById('mixing-badge');

        // --- BUSCADOR DE LETRAS MEJORADO ---
        async function loadLyrics(track, duration) {
            const content = document.getElementById('lyrics-content');
            content.innerHTML = '<div class="lyric-line">Buscando...</div>';
            currentLyrics = []; activeLyricIndex = -1;

            // 1. Limpieza para búsqueda
            let mainArtist = track.artist.split(/, | y | & /)[0].trim(); // Solo el primer artista
            let cleanTitle = track.title.replace(/remix|official|video/gi, '').trim(); // Título base
            let seconds = Math.round(duration);

            try {
                // Intento A: API GET (Duración Exacta)
                let res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(mainArtist)}&track_name=${encodeURIComponent(track.title)}&duration=${seconds}`);
                
                if (!res.ok) {
                    // Intento B: Búsqueda manual por Título y Artista
                    res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(cleanTitle + ' ' + mainArtist)}`);
                }

                let data = await res.json();
                let bestMatch = Array.isArray(data) ? data.find(i => Math.abs(i.duration - seconds) < 5 && i.syncedLyrics) : (data.syncedLyrics ? data : null);

                if (bestMatch) {
                    currentLyrics = bestMatch.syncedLyrics.split('\n').map(l => {
                        const m = l.match(/^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/);
                        return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() || "•••" } : null;
                    }).filter(i => i);
                    renderLyrics();
                } else {
                    content.innerHTML = '<div class="lyric-line">Letra no sincronizada</div>';
                }
            } catch (e) { content.innerHTML = '<div class="lyric-line">Error al conectar</div>'; }
        }

        function renderLyrics() {
            const content = document.getElementById('lyrics-content');
            content.innerHTML = currentLyrics.map((l, i) => `<div class="lyric-line" id="lyric-${i}">${l.text}</div>`).join('');
            document.querySelectorAll('.lyric-line').forEach((el, i) => {
                el.onclick = () => { (activeLayer === 1 ? a1 : a2).currentTime = currentLyrics[i].time; };
            });
        }

        // --- REPRODUCTOR ---
        function playTrack(idx, isManual = true) {
            let nextLayer = activeLayer === 1 ? 2 : 1;
            let currentA = activeLayer === 1 ? a1 : a2; 
            let nextA = nextLayer === 1 ? a1 : a2;
            let nextV = nextLayer === 1 ? v1 : v2;

            currentIdx = idx;
            let track = playlist[currentIdx];
            nextA.src = track.file; nextV.src = track.video;
            nextA.volume = 1;

            if (isManual) {
                isCrossfading = false; mixingBadge.classList.remove('active');
                currentA.pause();
                if (isPlaying) { nextA.play(); nextV.play(); }
                activeLayer = nextLayer;
                updateUI(track, nextLayer);
            }
        }

        function updateUI(track, layerNum) {
            document.getElementById('title').textContent = track.title;
            document.getElementById('artist').textContent = track.artist;
            const cover = document.getElementById('cover');
            cover.src = track.cover;
            cover.onload = () => extractColor(cover);

            v1.classList.toggle('active', layerNum === 1);
            v2.classList.toggle('active', layerNum === 2);

            let activeA = layerNum === 1 ? a1 : a2;
            let check = setInterval(() => {
                if (activeA.duration) { clearInterval(check); loadLyrics(track, activeA.duration); }
            }, 400);
        }

        function extractColor(img) {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 1; canvas.height = 1; ctx.drawImage(img, 0, 0, 1, 1);
            const [r, g, b] = ctx.getImageData(0,0,1,1).data;
            const c = `rgb(${r},${g},${b})`;
            document.documentElement.style.setProperty('--accent-color', c);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.4)`);
        }

        function handleTime() {
            let a = activeLayer === 1 ? a1 : a2;
            let pct = (a.currentTime / a.duration) * 100;
            progressBar.style.setProperty('--progress', `${pct}%`);
            document.getElementById('time-current').textContent = formatTime(a.currentTime);
            document.getElementById('time-total').textContent = formatTime(a.duration);

            if (!isCrossfading && a.duration - a.currentTime <= CROSSFADE_TIME) {
                isCrossfading = true; mixingBadge.classList.add('active');
                let nextIdx = (currentIdx + 1) % playlist.length;
                let nextA = activeLayer === 1 ? a2 : a1;
                let nextV = activeLayer === 1 ? v2 : v1;
                let track = playlist[nextIdx];
                nextA.src = track.file; nextV.src = track.video;
                nextA.volume = 0; nextA.play(); nextV.play();
                currentIdx = nextIdx; activeLayer = activeLayer === 1 ? 2 : 1;
                updateUI(track, activeLayer);
            }

            if (isCrossfading) {
                let outA = activeLayer === 1 ? a2 : a1;
                let inA = activeLayer === 1 ? a1 : a2;
                let ratio = (outA.duration - outA.currentTime) / CROSSFADE_TIME;
                outA.volume = Math.max(0, ratio);
                inA.volume = Math.min(1, 1 - ratio);
                if (outA.volume <= 0) { outA.pause(); isCrossfading = false; mixingBadge.classList.remove('active'); }
            }

            if (currentLyrics.length > 0) {
                let idx = currentLyrics.findIndex((l, i) => a.currentTime >= l.time && (!currentLyrics[i+1] || a.currentTime < currentLyrics[i+1].time));
                if (idx !== -1 && idx !== activeLyricIndex) {
                    activeLyricIndex = idx;
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    let el = document.getElementById(`lyric-${idx}`);
                    if (el) {
                        el.classList.add('active');
                        if (isLyricsVisible) document.getElementById('lyrics-content').scrollTo({ top: el.offsetTop - 150, behavior: 'smooth' });
                    }
                }
            }
        }

        function formatTime(s) { let m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc<10?'0':''}${sc}`; }

        document.getElementById('btn-play').onclick = () => {
            let a = activeLayer === 1 ? a1 : a2; let v = activeLayer === 1 ? v1 : v2;
            if (isPlaying) { a1.pause(); a2.pause(); v1.pause(); v2.pause(); document.body.classList.add('player-paused'); }
            else { a.play(); v.play(); document.body.classList.remove('player-paused'); }
            isPlaying = !isPlaying;
            document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block';
            document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
        };

        document.getElementById('btn-next').onclick = () => playTrack((currentIdx + 1) % playlist.length);
        document.getElementById('btn-prev').onclick = () => playTrack((currentIdx - 1 + playlist.length) % playlist.length);
        document.getElementById('btn-lyrics').onclick = () => {
            isLyricsVisible = !isLyricsVisible;
            document.getElementById('lyrics-overlay').classList.toggle('show');
        };

        a1.ontimeupdate = handleTime; a2.ontimeupdate = handleTime;
        progressBar.onchange = (e) => {
            let a = activeLayer === 1 ? a1 : a2;
            a.currentTime = (e.target.value / 100) * a.duration;
            (activeLayer === 1 ? v1 : v2).currentTime = a.currentTime;
        };

        playTrack(0, true);
    </script>
</body>
</html>
