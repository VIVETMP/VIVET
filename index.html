<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <style>
        @property --accent { syntax: '<color>'; inherits: true; initial-value: #ffffff; }
        :root {
            --accent: #ffffff; --accent-glow: rgba(255, 255, 255, 0.3);
            --bg-dark: #000; --text: #fff; --sub: rgba(255, 255, 255, 0.6);
            --spring: cubic-bezier(0.4, 0, 0.2, 1); --beat: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; background: var(--bg-dark); color: var(--text); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* VIDEO BACKGROUND CLEAN */
        .video-container { position: absolute; inset: 0; z-index: 1; }
        .video-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 2s ease; }
        .video-bg.active { opacity: 0.6; }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8)); z-index: 2; }

        /* PLAYER MAIN CARD */
        .player-card { 
            position: relative; z-index: 10; width: 90%; max-width: 420px; height: 85vh; max-height: 800px;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(45px) saturate(1.8); -webkit-backdrop-filter: blur(45px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 45px; padding: 35px;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); transition: background 1s ease;
        }

        /* ARTWORK SECTION */
        .art-section { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 10px; }
        .art-card { 
            width: 100%; height: 100%; border-radius: 35px; overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow);
            transform: scale(var(--beat)); transition: transform 0.5s var(--spring), box-shadow 1s;
        }
        .art-card img { width: 100%; height: 100%; object-fit: cover; }
        body.player-paused .art-card { transform: scale(0.85); opacity: 0.8; }

        /* INFO & CONTROLS */
        .info { margin-top: 10px; }
        .info h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { font-size: 17px; color: var(--accent); font-weight: 500; opacity: 0.8; margin-top: 4px; transition: color 0.8s; }

        .progress-container { margin: 25px 0 10px 0; }
        .bar { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; cursor: pointer; }
        .bar::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--accent) var(--p, 0%), transparent var(--p, 0%)); height: 100%; }
        .bar::-webkit-slider-thumb { -webkit-appearance: none; }
        .time { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; font-weight: 700; opacity: 0.5; letter-spacing: 0.5px; }

        .controls { display: flex; align-items: center; justify-content: space-between; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; transition: 0.3s var(--spring); display: flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.85); }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }
        
        .play-btn { width: 75px; height: 75px; background: #fff; color: #000; border-radius: 50%; box-shadow: 0 10px 25px rgba(255,255,255,0.1); }
        .play-btn svg { width: 32px; height: 32px; fill: #000; }
        
        .secondary-btn { opacity: 0.3; }
        .secondary-btn.active { opacity: 1; color: var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }

        /* LYRICS OVERLAY (INSIDE CARD) */
        .lyrics-box {
            position: absolute; inset: 0; border-radius: 45px; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); opacity: 0; pointer-events: none; 
            transition: 0.6s var(--spring); z-index: 20; padding: 40px;
        }
        .lyrics-box.show { opacity: 1; pointer-events: auto; }
        .lyrics-scroll { height: 100%; overflow-y: scroll; scrollbar-width: none; mask-image: linear-gradient(transparent, #000 15%, #000 85%, transparent); }
        .l-line { font-size: 22px; font-weight: 800; margin: 25px 0; opacity: 0.2; transition: 0.4s; transform: scale(0.9); }
        .l-line.active { opacity: 1; transform: scale(1.1); color: var(--accent); }

        .mixing-label { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 900; background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; opacity: 0; transition: 0.5s; z-index: 30; }
        .mixing-label.active { opacity: 1; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } }
    </style>
</head>
<body class="player-paused">

    <div class="video-container">
        <video id="v1" class="video-bg active" muted playsinline></video>
        <video id="v2" class="video-bg" muted playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="player-card" id="card">
        <div id="mix" class="mixing-label">MIXING NEXT...</div>
        
        <div class="art-section">
            <div class="art-card">
                <img id="cover" src="" alt="">
            </div>
            <!-- Botón de letras arriba de la portada -->
            <button class="btn secondary-btn" id="btn-lyr" style="position: absolute; bottom: -10px; right: -10px; z-index: 25; background: rgba(0,0,0,0.5); border-radius: 50%; width: 45px; height: 45px;">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H4V6h16v12zM7 8h10v2H7zm0 4h10v2H7z"/></svg>
            </button>
        </div>

        <div class="info">
            <h1 id="title">Cargando...</h1>
            <p id="artist">VIVET Music</p>
        </div>

        <div class="progress-container">
            <input type="range" id="prog" class="bar" min="0" max="100" value="0" step="0.1">
            <div class="time"><span id="cur">0:00</span><span id="tot">0:00</span></div>
        </div>

        <div class="controls">
            <button class="btn secondary-btn" id="shuf"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
            <button class="btn" id="prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn play-btn" id="play">
                <svg id="i-p" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                <svg id="i-s" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn" id="next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
            <button class="btn secondary-btn" id="rep"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
        </div>

        <div id="lyr-box" class="lyrics-box">
            <div id="lyr-s" class="lyrics-scroll"></div>
        </div>
    </div>

    <script>
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" }
        ];

        let curIdx = 0, playing = false, shuf = false, rep = false, crossing = false, activeA = 1, lyrics = [], lyrI = -1, audioCtx, analyser, dataA;
        const $ = s => document.querySelector(s), a1 = new Audio(), a2 = new Audio();
        [a1, a2].forEach(a => { a.crossOrigin = "anonymous"; a.ontimeupdate = e => handleTime(e); });

        const initAudio = () => {
            if (audioCtx) return; audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; dataA = new Uint8Array(analyser.frequencyBinCount);
            [a1, a2].forEach(a => audioCtx.createMediaElementSource(a).connect(analyser));
            analyser.connect(audioCtx.destination); loop();
        };

        const loop = () => {
            analyser.getByteFrequencyData(dataA);
            document.documentElement.style.setProperty('--beat', 1 + (dataA[1]/255 * 0.05));
            requestAnimationFrame(loop);
        };

        const load = (idx, man = true) => {
            crossing = false; $('#mix').classList.remove('active');
            let nA = activeA === 1 ? a2 : a1, cA = activeA === 1 ? a1 : a2, t = playlist[idx];
            curIdx = idx; nA.src = t.file; nA.load();
            if(man) { cA.pause(); cA.volume = 0; nA.volume = 1; if(playing) nA.play(); activeA = activeA === 1 ? 2 : 1; }
            ui(t);
        };

        const ui = (t) => {
            $('#title').innerText = t.title; $('#artist').innerText = t.artist; $('#cover').src = t.cover;
            const vA = activeA === 1 ? $('#v1') : $('#v2'), vB = activeA === 1 ? $('#v2') : $('#v1');
            if(t.video) { vA.src = t.video; vA.classList.add('active'); vB.classList.remove('active'); vA.play(); }
            else { $('.video-bg').forEach(v => v.classList.remove('active')); }
            color(t.cover); fetchLyr(t, activeA === 1 ? a1 : a2);
        };

        const color = (src) => {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = src;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = 1; cvs.height = 1;
                ctx.drawImage(img, 0,0,1,1); const d = ctx.getImageData(0,0,1,1).data;
                const rgb = `rgb(${d[0]},${d[1]},${d[2]})`;
                document.documentElement.style.setProperty('--accent', rgb);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${d[0]},${d[1]},${d[2]}, 0.4)`);
                $('#card').style.background = `rgba(${d[0]},${d[1]},${d[2]}, 0.08)`;
            };
        };

        const fetchLyr = async (t, aud) => {
            lyrics = []; $('#lyr-s').innerHTML = '<div class="l-line active">...</div>';
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(t.artist.split(',')[0])}&track_name=${encodeURIComponent(t.title)}&duration=${Math.round(aud.duration || 180)}`);
                const data = await res.json();
                if(data.syncedLyrics) {
                    lyrics = data.syncedLyrics.split('\n').map(l => {
                        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                        return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3] } : null;
                    }).filter(Boolean);
                    $('#lyr-s').innerHTML = lyrics.map((l, i) => `<div class="l-line" id="l-${i}">${l.text || '•••'}</div>`).join('');
                }
            } catch(e) {}
        };

        const handleTime = e => {
            let a = activeA === 1 ? a1 : a2; if (e.target !== a) return;
            // CROSSFADE LOGIC (12 SECONDS)
            if (!crossing && a.duration && (a.duration - a.currentTime <= 12) && !rep) {
                crossing = true; $('#mix').classList.add('active');
                let nIdx = shuf ? Math.floor(Math.random()*playlist.length) : (curIdx+1)%playlist.length;
                load(nIdx, false);
                let nA = activeA === 1 ? a2 : a1; nA.volume = 0; nA.play();
                let f = setInterval(() => {
                    a.volume = Math.max(0, a.volume - 0.05); nA.volume = Math.min(1, nA.volume + 0.05);
                    if(nA.volume >= 1) { clearInterval(f); a.pause(); activeA = activeA === 1 ? 2 : 1; crossing = false; $('#mix').classList.remove('active'); }
                }, 250);
            }
            // REPEAT ONE LOGIC
            if(rep && a.currentTime >= a.duration - 0.5) a.currentTime = 0;

            const p = (a.currentTime / a.duration) * 100;
            $('#prog').style.setProperty('--p', `${p}%`);
            $('#cur').innerText = fmt(a.currentTime); $('#tot').innerText = fmt(a.duration);
            
            let idx = lyrics.findIndex((l, i) => a.currentTime >= l.t && (!lyrics[i+1] || a.currentTime < lyrics[i+1].t));
            if (idx !== -1 && idx !== lyrI) {
                lyrI = idx; document.querySelectorAll('.l-line').forEach((el, i) => el.className = `l-line ${i===idx?'active':''}`);
                const el = $(`#l-${idx}`); if(el) $('#lyr-s').scrollTo({ top: el.offsetTop - 150, behavior: 'smooth' });
            }
        };

        const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        $('#play').onclick = () => {
            initAudio(); playing = !playing;
            const a = activeA === 1 ? a1 : a2; const v = activeA === 1 ? $('#v1') : $('#v2');
            playing ? (a.play(), v.play(), $('body').classList.remove('player-paused')) : (a.pause(), v.pause(), $('body').classList.add('player-paused'));
            $('#i-p').style.display = playing ? 'none' : 'block'; $('#i-s').style.display = playing ? 'block' : 'none';
        };

        $('#next').onclick = () => load(shuf ? Math.floor(Math.random()*playlist.length) : (curIdx+1)%playlist.length);
        $('#prev').onclick = () => load((curIdx-1+playlist.length)%playlist.length);
        $('#shuf').onclick = function() { shuf = !shuf; this.classList.toggle('active'); };
        $('#rep').onclick = function() { rep = !rep; this.classList.toggle('active'); };
        $('#btn-lyr').onclick = () => $('#lyr-box').classList.toggle('show');
        $('#prog').oninput = e => { (activeA === 1 ? a1 : a2).currentTime = (e.target.value/100)*(activeA === 1 ? a1 : a2).duration; };
        
        load(0);
    </script>
</body>
</html>
