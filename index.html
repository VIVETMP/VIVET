<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    
    <style>
        /* Propiedades modernas para transiciones suaves */
        @property --accent-color { syntax: '<color>'; inherits: true; initial-value: #ffffff; }
        @property --glow-opacity { syntax: '<number>'; inherits: true; initial-value: 0.4; }

        :root {
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, var(--glow-opacity));
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
            --lyric-inactive: rgba(255, 255, 255, 0.15);
            --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --beat-scale: 1;
            transition: --accent-color 0.8s ease;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh; width: 100vw;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
            perspective: 1200px;
        }

        /* Fondo con movimiento Ken Burns optimizado */
        .video-background, .image-fallback {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0; 
            transition: opacity 1.5s ease-in-out;
            animation: kenBurns 30s infinite alternate ease-in-out;
        }
        @keyframes kenBurns {
            0% { transform: scale(1) translate(0,0); }
            50% { transform: scale(1.15) translate(-1%, -1%); }
            100% { transform: scale(1.1) translate(1%, 1%); }
        }

        .video-background.active, .image-fallback.active { opacity: 0.5; z-index: 2; }
        .image-fallback { filter: blur(60px) brightness(0.3) saturate(1.6); }

        .overlay { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 40%, transparent 0%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,1) 100%); 
            z-index: 3; 
        }

        /* Resplandor ambiental que reacciona al color */
        body::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--accent-glow) 0%, transparent 70%);
            z-index: 4; opacity: 0.3; pointer-events: none;
            animation: ambientGlow 8s infinite alternate ease-in-out;
        }
        @keyframes ambientGlow { 0% { transform: scale(1); opacity: 0.2; } 100% { transform: scale(1.3); opacity: 0.4; } }

        .player-app {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
            padding: 40px 30px; display: flex; flex-direction: column;
            justify-content: space-between;
            animation: playerFloat 6s infinite ease-in-out;
        }
        @keyframes playerFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .header { 
            display: flex; justify-content: center; align-items: center; gap: 12px;
            font-size: 13px; font-weight: 800; letter-spacing: 5px; color: var(--accent-color); 
            text-transform: uppercase; text-shadow: 0 0 20px var(--accent-glow);
        }

        .site-logo {
            width: 32px; height: 32px;
            background-color: var(--accent-color);
            -webkit-mask: url('covers/LOGO.png') no-repeat center / contain;
            mask: url('covers/LOGO.png') no-repeat center / contain;
            transition: all 0.3s var(--spring-easing);
            transform: scale(var(--beat-scale));
        }
        
        body:not(.player-paused) .site-logo { animation: rotateLogo 10s infinite linear; }
        @keyframes rotateLogo { from { transform: scale(var(--beat-scale)) rotate(0deg); } to { transform: scale(var(--beat-scale)) rotate(360deg); } }

        .mini-eq { display: flex; align-items: flex-end; gap: 3px; height: 16px; width: 25px; }
        .eq-bar { 
            flex: 1; background: var(--accent-color); border-radius: 1px; 
            height: 3px; transition: height 0.15s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        #artwork-wrapper { 
            position: relative; margin-bottom: 20px; 
            transform: scale(var(--beat-scale));
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .artwork-container {
            width: 100%; aspect-ratio: 1; border-radius: 32px; overflow: hidden;
            position: relative; z-index: 5;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 50px var(--accent-glow);
            transition: all 1s var(--spring-easing);
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s ease; }
        
        body.player-paused .artwork-container { transform: scale(0.85) rotateX(15deg) rotateY(-5deg) !important; opacity: 0.7; }

        /* MEJORA: Letras con entrada cinemática */
        .lyrics-overlay {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(45px) saturate(2.5); -webkit-backdrop-filter: blur(45px) saturate(2.5);
            display: flex; flex-direction: column; overflow: hidden;
            opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .lyrics-overlay.show { opacity: 1; pointer-events: auto; }
        
        .lyrics-content {
            width: 100%; height: 100%; overflow-y: auto; padding: 70% 30px; 
            scroll-behavior: smooth; scrollbar-width: none;
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
        }

        .lyric-line {
            font-size: clamp(22px, 7vw, 26px); font-weight: 800; line-height: 1.3;
            margin: 32px 0; transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            color: var(--lyric-inactive); filter: blur(3px); transform: translateY(20px) scale(0.9);
            cursor: pointer; opacity: 0.4;
        }
        /* Animación de entrada escalonada cuando aparece el overlay */
        .lyrics-overlay.show .lyric-line { opacity: 1; transform: translateY(0) scale(1); filter: blur(2px); }

        .lyric-line.active {
            color: #ffffff; filter: blur(0); transform: scale(1.15) translateX(5px);
            text-shadow: 0 0 30px var(--accent-glow); opacity: 1;
        }
        .lyric-line.passed { color: rgba(255, 255, 255, 0.2); filter: blur(1px); transform: scale(0.95); }

        .track-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .track-info-animated { flex: 1; min-width: 0; }
        .bop-animation { animation: trackReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes trackReveal {
            0% { transform: translateX(-30px); opacity: 0; filter: blur(10px); }
            100% { transform: translateX(0); opacity: 1; filter: blur(0); }
        }

        .track-title { font-size: 28px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -1px; }
        .track-artist { font-size: 17px; font-weight: 500; color: var(--text-sub); margin-top: 4px; }

        .progress-area { margin-bottom: 35px; cursor: pointer; }
        .progress-bar {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 10px;
            background: rgba(255,255,255,0.1); outline: none;
            background-image: linear-gradient(to right, var(--accent-color), var(--accent-color));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
            transition: height 0.3s var(--spring-easing), box-shadow 0.3s;
        }
        .progress-area:hover .progress-bar { height: 10px; box-shadow: 0 0 25px var(--accent-glow); }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 20px var(--accent-color);
            cursor: pointer; opacity: 0; transition: 0.3s var(--spring-easing);
            border: 4px solid var(--accent-color);
        }
        .progress-area:hover .progress-bar::-webkit-slider-thumb { opacity: 1; transform: scale(1.1); }

        .controls { display: flex; align-items: center; justify-content: space-between; padding: 0 5px; }
        .btn { 
            background: none; border: none; cursor: pointer; color: var(--accent-color); 
            transition: all 0.4s var(--spring-easing); filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .btn:hover { transform: scale(1.2) translateY(-3px); filter: drop-shadow(0 5px 15px var(--accent-glow)); }
        .btn:active { transform: scale(0.9); }
        .btn svg { width: 32px; height: 32px; fill: currentColor; }
        
        .btn-play {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--accent-color); color: #000; justify-content: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow);
            transform: scale(var(--beat-scale));
        }
        .btn-play svg { width: 40px; height: 40px; fill: #000; }
        .btn-secondary { opacity: 0.4; }
        .btn-secondary.active { opacity: 1; filter: drop-shadow(0 0 15px var(--accent-color)); }

        .mixing-badge {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            background: var(--accent-color); color: #000; padding: 6px 18px;
            border-radius: 30px; font-size: 11px; font-weight: 900;
            opacity: 0; visibility: hidden; transition: 0.5s var(--spring-easing);
            box-shadow: 0 10px 20px var(--accent-glow);
        }
        .mixing-badge.active { opacity: 1; visibility: visible; animation: badgePop 1s infinite alternate; }
        @keyframes badgePop { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.1); } }
    </style>
</head>
<body class="player-paused">

    <img id="fallback-bg" class="image-fallback" src="" alt="Fondo">
    <video id="vid1" class="video-background active" crossorigin="anonymous" muted playsinline></video>
    <video id="vid2" class="video-background" crossorigin="anonymous" muted playsinline></video>

        <div class="header">
            <div class="mixing-badge" id="mixing-badge">TRANSICIÓN...</div>
            <div class="site-logo"></div> V I V E T
            <div class="mini-eq" id="eq-container">
                <div class="eq-bar"></div><div class="eq-bar"></div>

                <img id="cover" src="" alt="Portada" crossorigin="anonymous">

                </button>

                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">

                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn btn-secondary" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        // Mantenemos tu playlist intacta
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" }
        ];

        let currentIdx = 0; let isPlaying = false; let isDragging = false;
        let isShuffle = false; let isRepeat = false; let isCrossfading = false;
        let fadeStartTime = 0; let fadingOutAudio = null; let fadingInAudio = null;
        let activeLayer = 1; const CROSSFADE_TIME = 12;

        const a1 = new Audio(), a2 = new Audio();
        a1.crossOrigin = "anonymous"; a2.crossOrigin = "anonymous";
        const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
        const fallbackBg = document.getElementById('fallback-bg');
        const progressBar = document.getElementById('progress');
        const timeCurrentEl = document.getElementById('time-current');
        const timeTotalEl = document.getElementById('time-total');
        const playBtn = document.getElementById('btn-play');
        const mixingBadge = document.getElementById('mixing-badge');
        const trackAnimator = document.getElementById('track-animator');
        const colorCache = {};

        let audioCtx, analyser, dataArray, source1, source2;

        function initAudioContext() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source1 = audioCtx.createMediaElementSource(a1);
            source2 = audioCtx.createMediaElementSource(a2);
            source1.connect(analyser); source2.connect(analyser);
            analyser.connect(audioCtx.destination);
            drawEQ();
        }

        function drawEQ() {
            analyser.getByteFrequencyData(dataArray);
            const bars = document.querySelectorAll('.eq-bar');
            bars.forEach((bar, i) => {
                let val = dataArray[i * 2] || 0;
                let h = Math.max(3, (val / 255) * 16);
                bar.style.height = h + 'px';
            });
            let bass = dataArray[1] / 255;
            let scale = 1 + (bass * 0.04);
            document.documentElement.style.setProperty('--beat-scale', scale);
            requestAnimationFrame(drawEQ);
        }

        let currentLyrics =[];
        let activeLyricIndex = -1;
        let isLyricsVisible = false;
        let lyricsRequestCount = 0; 

        document.getElementById('btn-lyrics').addEventListener('click', function() {
            isLyricsVisible = !isLyricsVisible;
            this.classList.toggle('active', isLyricsVisible);
            document.getElementById('lyrics-overlay').classList.toggle('show', isLyricsVisible);
            if(isLyricsVisible) setTimeout(updateLyricsScroll, 100);
        });

        function parseLRC(lrc) {
            const lines = lrc.split('\n');
            const result = [];
            const regex = /^\[(\d{2}):(\d{2}(?:\.\d{1,3})?)\](.*)/;
            for (let line of lines) {
                const match = line.match(regex);
                if (match) {
                    const min = parseInt(match[1], 10);
                    const sec = parseFloat(match[2]);
                    const text = match[3].trim() || "•••"; 
                    result.push({ time: min * 60 + sec, text: text });
                }
            }
            return result.sort((a,b) => a.time - b.time);
        }

        async function loadLyrics(track, audioDuration) {
            lyricsRequestCount++;
            let currentReq = lyricsRequestCount;
            currentLyrics =[]; activeLyricIndex = -1;
            const content = document.getElementById('lyrics-content');
            content.innerHTML = '<div class="lyric-line" style="opacity:0.5; text-align:center;">Sincronizando...</div>';

            let cleanArtist = track.artist.split(',')[0].split(' y ')[0].split(' & ')[0].trim();
            let bestMatch = null;

            try {
                const exactRes = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(cleanArtist)}&track_name=${encodeURIComponent(track.title)}&duration=${Math.round(audioDuration)}`);
                if (exactRes.ok) {
                    const data = await exactRes.json();
                    if (data && (data.syncedLyrics || data.plainLyrics)) bestMatch = data;
                }
                if (!bestMatch) {
                    const searchRes = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(track.title)}&artist_name=${encodeURIComponent(cleanArtist)}`);
                    if (searchRes.ok) {
                        const results = await searchRes.json();
                        if (results && results.length > 0) {
                            results.sort((a, b) => Math.abs((a.duration || 0) - audioDuration) - Math.abs((b.duration || 0) - audioDuration));
                            bestMatch = results[0];
                        }
                    }
                }
            } catch (e) { }

            if (currentReq !== lyricsRequestCount) return;

            if (bestMatch) {
                if (bestMatch.syncedLyrics) { currentLyrics = parseLRC(bestMatch.syncedLyrics); renderLyrics(); }
                else if (bestMatch.plainLyrics) renderPlainLyrics(bestMatch.plainLyrics);
            } else content.innerHTML = '<div class="lyric-line" style="opacity:0.5; text-align:center;">Letra no disponible</div>';
        }

        function renderPlainLyrics(text) {
            const content = document.getElementById('lyrics-content'); content.innerHTML = '';
            text.split('\n').forEach((line, i) => {
                const div = document.createElement('div');
                div.className = 'lyric-line active'; div.style.color = '#fff'; div.style.filter = 'none';
                div.style.transitionDelay = `${i * 0.05}s`; // Entrada escalonada
                div.textContent = line.trim() || "•••"; content.appendChild(div);
            });
            currentLyrics =[];
        }

        function renderLyrics() {
            const content = document.getElementById('lyrics-content'); content.innerHTML = '';
            currentLyrics.forEach((lyric, i) => {
                const div = document.createElement('div');
                div.className = 'lyric-line'; div.textContent = lyric.text; div.id = `lyric-${i}`;
                div.style.transitionDelay = `${i * 0.03}s`; // Entrada escalonada
                div.onclick = () => {
                    let activeAudio = activeLayer === 1 ? a1 : a2;
                    if(activeAudio.duration) activeAudio.currentTime = lyric.time;
                };
                content.appendChild(div);
            });
        }

        function updateLyricsScroll() {
            if (activeLyricIndex === -1 || !isLyricsVisible) return;
            const container = document.getElementById('lyrics-content');
            const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
            if (activeEl) {
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach((el, i) => {
                    el.classList.toggle('passed', i < activeLyricIndex);
                    el.classList.toggle('active', i === activeLyricIndex);
                    if(i === activeLyricIndex) el.style.transitionDelay = '0s'; // Reacción instantánea
                });
                const scrollPos = activeEl.offsetTop - (container.clientHeight * 0.45);
                container.scrollTo({ top: scrollPos, behavior: 'smooth' });
            }
        }

        function handleAudioTick(e) {
            let activeAudio = activeLayer === 1 ? a1 : a2;
            let activeVideo = activeLayer === 1 ? v1 : v2;
            if (e.target === activeAudio && !isDragging) {
                if (activeVideo.src && Math.abs(activeAudio.currentTime - activeVideo.currentTime) > 0.3) activeVideo.currentTime = activeAudio.currentTime;
            }
            if (e.target === activeAudio && !isCrossfading && activeAudio.duration) {
                if (activeAudio.duration - activeAudio.currentTime <= CROSSFADE_TIME && activeAudio.currentTime > CROSSFADE_TIME) startAutomaticCrossfade();
            }
            if (isCrossfading && fadingOutAudio && fadingInAudio) {
                let elapsed = (Date.now() - fadeStartTime) / 1000;
                let progress = Math.min(elapsed / CROSSFADE_TIME, 1);
                fadingOutAudio.volume = Math.cos(progress * 0.5 * Math.PI);
                fadingInAudio.volume = Math.sin(progress * 0.5 * Math.PI);
                if (progress >= 1) { fadingOutAudio.pause(); fadingOutAudio.volume = 0; isCrossfading = false; mixingBadge.classList.remove('active'); fadingOutAudio = null; fadingInAudio = null; }
            }
        }

        a1.addEventListener('timeupdate', handleAudioTick);
        a2.addEventListener('timeupdate', handleAudioTick);

        function updateVisualLoop() {
            let activeAudio = activeLayer === 1 ? a1 : a2;
            if (activeAudio && !isNaN(activeAudio.duration) && !isDragging) {
                let curTime = activeAudio.currentTime;
                let pct = (curTime / activeAudio.duration) * 100;
                progressBar.value = pct;
                progressBar.style.setProperty('--progress', `${pct}%`);
                timeCurrentEl.textContent = formatTime(curTime);
                timeTotalEl.textContent = formatTime(activeAudio.duration);
                
                if (currentLyrics.length > 0) {
                    let newIdx = -1;
                    for (let i = 0; i < currentLyrics.length; i++) {
                        if (curTime >= (currentLyrics[i].time - 0.1)) { newIdx = i; } else { break; }
                    }
                    if (newIdx !== -1 && newIdx !== activeLyricIndex) { activeLyricIndex = newIdx; updateLyricsScroll(); }
                }
            }
            requestAnimationFrame(updateVisualLoop);
        }
        requestAnimationFrame(updateVisualLoop);

        function playTrack(idx, isManualSkip = true) {
            isCrossfading = false; mixingBadge.classList.remove('active');
            if (fadingOutAudio) { fadingOutAudio.pause(); fadingOutAudio.volume = 0; }
            let nextLayer = activeLayer === 1 ? 2 : 1;
            let currentAudio = activeLayer === 1 ? a1 : a2; 
            let nextAudio = nextLayer === 1 ? a1 : a2; let nextVideo = nextLayer === 1 ? v1 : v2;
            currentIdx = idx; let track = playlist[currentIdx];
            nextAudio.src = track.file; 
            if (track.video) { nextVideo.src = track.video; nextVideo.load(); } else { nextVideo.src = ""; }
            nextAudio.currentTime = 0;
            updateUI(track, nextLayer, isManualSkip);
            if (isManualSkip) {
                currentAudio.pause(); currentAudio.volume = 0; nextAudio.volume = 1;
                if (isPlaying) { nextAudio.play().catch(e=>{}); if(track.video) nextVideo.play().catch(e=>{}); }
                activeLayer = nextLayer;
            }
        }

        function startAutomaticCrossfade() {
            isCrossfading = true; mixingBadge.classList.add('active');
            let nextIdx = (isShuffle) ? Math.floor(Math.random() * playlist.length) : (currentIdx + 1) % playlist.length;
            let nextLayer = activeLayer === 1 ? 2 : 1;
            fadingOutAudio = activeLayer === 1 ? a1 : a2; fadingInAudio = nextLayer === 1 ? a1 : a2;
            let nextVideo = nextLayer === 1 ? v1 : v2; let track = playlist[nextIdx];
            fadingInAudio.src = track.file; 
            if(track.video) { nextVideo.src = track.video; nextVideo.load(); } else { nextVideo.src = ""; }
            fadingInAudio.volume = 0; fadingInAudio.currentTime = 0;
            fadingInAudio.play().catch(e=>{}); if(track.video) nextVideo.play().catch(e=>{});
            fadeStartTime = Date.now(); currentIdx = nextIdx; activeLayer = nextLayer;
            updateUI(track, nextLayer, false);
        }

        function updateUI(track, layerNum, isManual = false) {
            trackAnimator.classList.remove('bop-animation'); void trackAnimator.offsetWidth; trackAnimator.classList.add('bop-animation');
            document.getElementById('title').textContent = track.title;
            document.getElementById('artist').textContent = track.artist;
            document.getElementById('cover').src = track.cover;
            
            let activeAudio = layerNum === 1 ? a1 : a2;
            let checkDur = setInterval(() => {
                if (activeAudio.duration) { clearInterval(checkDur); loadLyrics(track, activeAudio.duration); }
            }, 100);

            if (track.video) {
                fallbackBg.classList.remove('active');
                if (layerNum === 1) { v1.classList.add('active'); v2.classList.remove('active'); } 
                else { v2.classList.add('active'); v1.classList.remove('active'); }
            } else {
                v1.classList.remove('active'); v2.classList.remove('active');
                fallbackBg.src = track.cover; fallbackBg.classList.add('active');
            }
            extractColor(track.cover);
        }

        function extractColor(imgSrc) {
            if (colorCache[imgSrc]) { applyColor(colorCache[imgSrc].r, colorCache[imgSrc].g, colorCache[imgSrc].b); return; }
            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas'); canvas.width = 30; canvas.height = 30; 
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, 30, 30);
                const data = ctx.getImageData(0, 0, 30, 30).data;
                let maxScore = -1, bestR = 255, bestG = 255, bestB = 255;
                for(let i = 0; i < data.length; i += 4) {
                    let r = data[i], g = data[i+1], b = data[i+2];
                    if ((r<40 && g<40 && b<40) || (r>230 && g>230 && b>230)) continue;
                    let max = Math.max(r, g, b), min = Math.min(r, g, b);
                    let score = (max === 0 ? 0 : (max - min) / max) * max;
                    if(score > maxScore) { maxScore = score; bestR = r; bestG = g; bestB = b; }
                }
                let lum = (bestR * 299 + bestG * 587 + bestB * 114) / 1000;
                if (lum < 110) { let factor = 150 / Math.max(lum, 1); bestR = Math.min(255, Math.round(bestR * factor)); bestG = Math.min(255, Math.round(bestG * factor)); bestB = Math.min(255, Math.round(bestB * factor)); }
                colorCache[imgSrc] = {r: bestR, g: bestG, b: bestB}; applyColor(bestR, bestG, bestB);
            };
            img.src = imgSrc;
        }

        function applyColor(r, g, b) { 
            document.documentElement.style.setProperty('--accent-color', `rgb(${r}, ${g}, ${b})`); 
        }

        function togglePlay() {
            initAudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume();
            let activeAudio = activeLayer === 1 ? a1 : a2; let track = playlist[currentIdx];
            if (isPlaying) {
                a1.pause(); a2.pause(); if(v1.src) v1.pause(); if(v2.src) v2.pause(); document.body.classList.add('player-paused');
                document.getElementById('icon-play').style.display = 'block'; document.getElementById('icon-pause').style.display = 'none';
            } else {
                if(a1.volume > 0) { a1.play(); if(track.video && activeLayer === 1) v1.play(); }
                if(a2.volume > 0) { a2.play(); if(track.video && activeLayer === 2) v2.play(); }
                document.body.classList.remove('player-paused');
                document.getElementById('icon-play').style.display = 'none'; document.getElementById('icon-pause').style.display = 'block';
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);
        document.getElementById('btn-next').addEventListener('click', () => playTrack(((isShuffle) ? Math.floor(Math.random() * playlist.length) : (currentIdx + 1) % playlist.length), true));
        document.getElementById('btn-prev').addEventListener('click', () => playTrack((currentIdx - 1 + playlist.length) % playlist.length, true));
        document.getElementById('btn-shuffle').addEventListener('click', function() { isShuffle = !isShuffle; this.classList.toggle('active', isShuffle); });
        document.getElementById('btn-repeat').addEventListener('click', function() { isRepeat = !isRepeat; this.classList.toggle('active', isRepeat); });
        progressBar.addEventListener('input', (e) => { isDragging = true; progressBar.style.setProperty('--progress', `${e.target.value}%`); });
        progressBar.addEventListener('change', (e) => {
            isDragging = false; let activeAudio = activeLayer === 1 ? a1 : a2;
            if (activeAudio.duration) activeAudio.currentTime = (e.target.value / 100) * activeAudio.duration;
        });

        function formatTime(s) {
            if (isNaN(s)) return "0:00"; let m = Math.floor(s / 60); let sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        playTrack(currentIdx, true);
    </script>
</body>
</html>
