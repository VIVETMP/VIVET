<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Minimal Premium</title>
    <style>
        @property --accent-color { syntax: '<color>'; inherits: true; initial-value: #ff0072; }
        :root {
            --accent-color: #ff0072; --accent-glow: rgba(255, 255, 255, 0.2);
            --bg: #050505; --text: #ffffff; --sub: rgba(255, 255, 255, 0.5);
            --spring: cubic-bezier(0.4, 0, 0.2, 1); --beat: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "SF Pro Display", -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { height: 100vh; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        /* VIBRANT MESH BACKGROUND */
        .mesh { position: absolute; inset: 0; z-index: 1; filter: blur(100px) saturate(2); opacity: 0.8; }
        .blob { position: absolute; width: 80vmax; height: 80vmax; background: var(--accent-color); border-radius: 50%; opacity: 0.5; animation: roam 30s infinite alternate linear; }
        .blob:nth-child(2) { background: #4158D0; width: 60vmax; height: 60vmax; animation-duration: 40s; left: -20%; }
        @keyframes roam { from { transform: translate(-10%, -10%) rotate(0); } to { transform: translate(10%, 10%) rotate(360deg); } }

        .video-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; opacity: 0; transition: 1.5s ease; }
        .video-bg.active { opacity: 0.4; }
        .overlay { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, var(--bg) 100%); z-index: 3; }

        /* COMPACT PLAYER */
        .player { position: relative; z-index: 10; width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 25px; transition: 0.6s var(--spring); }
        
        .art-zone { position: relative; width: 100%; aspect-ratio: 1; perspective: 1000px; }
        .art-card { width: 100%; height: 100%; border-radius: 32px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5); transform: scale(var(--beat)); transition: 0.5s var(--spring); position: relative; z-index: 5; }
        .art-card img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }
        body.player-paused .art-card { transform: scale(0.82) translateY(10px); opacity: 0.8; }

        /* THE FLOATING DECK */
        .deck { background: rgba(255,255,255,0.06); backdrop-filter: blur(30px) saturate(1.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 35px; padding: 20px 24px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        .info { text-align: left; }
        .info h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info p { font-size: 15px; color: var(--accent-color); font-weight: 500; opacity: 0.9; margin-top: 2px; }

        .prog-wrap { width: 100%; }
        .bar { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; cursor: pointer; }
        .bar::-webkit-slider-runnable-track { background: linear-gradient(to right, var(--accent-color) var(--p, 0%), transparent var(--p, 0%)); height: 100%; }
        .bar::-webkit-slider-thumb { -webkit-appearance: none; }
        .times { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; font-weight: 800; opacity: 0.4; letter-spacing: 0.5px; }

        .btns { display: flex; align-items: center; justify-content: space-between; padding: 0 5px; }
        .btn { background: none; border: none; color: #fff; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .btn:active { transform: scale(0.9); }
        .btn svg { width: 26px; height: 26px; fill: currentColor; }
        .play { width: 58px; height: 58px; background: #fff; color: #000; border-radius: 50%; justify-content: center; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .play svg { width: 28px; height: 28px; fill: #000; }
        .sub-btn { opacity: 0.3; }
        .sub-btn.active { opacity: 1; color: var(--accent-color); }

        /* MODERN LYRICS */
        .lyr-ov { position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(50px); opacity: 0; pointer-events: none; transition: 0.8s var(--spring); display: flex; align-items: center; }
        .lyr-ov.show { opacity: 1; pointer-events: auto; }
        .lyr-cont { width: 100%; height: 70vh; overflow-y: scroll; padding: 0 40px; scrollbar-width: none; mask-image: linear-gradient(transparent, #000 15%, #000 85%, transparent); }
        .l-line { font-size: 24px; font-weight: 800; margin: 30px 0; opacity: 0.2; transition: 0.4s; transform: scale(0.95); filter: blur(2px); cursor: pointer; }
        .l-line.active { opacity: 1; transform: scale(1.1); filter: blur(0); color: var(--accent-color); }

        #mix { position: absolute; top: -12px; right: 30px; background: var(--accent-color); color: #000; padding: 3px 10px; border-radius: 8px; font-size: 8px; font-weight: 900; opacity: 0; transition: 0.4s; z-index: 11; }
        #mix.active { opacity: 1; transform: translateY(-5px); }
    </style>
</head>
<body class="player-paused">

    <div class="mesh"><div class="blob"></div><div class="blob"></div></div>
    <video id="v1" class="video-bg active" muted playsinline></video>
    <video id="v2" class="video-bg" muted playsinline></video>
    <div class="overlay"></div>

    <div class="player">
        <div class="art-zone">
            <div id="mix">MIXING...</div>
            <div class="art-card">
                <img id="cover" src="" alt="">
            </div>
        </div>

        <div class="deck">
            <div class="info">
                <h1 id="title">Cargando...</h1>
                <p id="artist">VIVET</p>
            </div>

            <div class="prog-wrap">
                <input type="range" id="prog" class="bar" min="0" max="100" value="0" step="0.1">
                <div class="times"><span id="cur">0:00</span><span id="tot">0:00</span></div>
            </div>

            <div class="btns">
                <button class="btn sub-btn" id="shuf"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="btn play" id="play">
                    <svg id="i-p" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="i-s" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn sub-btn" id="btn-l"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H4V6h16v12zM7 8h10v2H7zm0 4h10v2H7z"/></svg></button>
            </div>
        </div>
    </div>

    <div id="lyr-ov" class="lyr-ov"><div id="lyr-c" class="lyr-cont"></div></div>

    <script>
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774293246/FALSAS_PROMESAS_REMIX_scyyb7.mp4" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "PASION Y S3XO", artist: "KRIS R y ROA", cover: "covers/PASION Y S3XO.jpg", file: "songs/PASION Y S3XO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774028481/PASION_Y_S3XO_vstnjo.mp4" },
            { title: "PIEZA EXHIBICION", artist: "LUAR LA L, ROA y BLESSD", cover: "covers/PIEZA EXHIBICION.jpg", file: "songs/PIEZA EXHIBICION.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774030135/PIEZA_EXHIBICION_hjn7nx.mp4" },
            { title: "PALABRAS SOBRAN REMIX", artist: "BLESSD, RYAN CASTRO, BRYANT MYERS y HADES66", cover: "covers/PALABRAS SOBRAN REMIX.jpg", file: "songs/PALABRAS SOBRAN REMIX.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774032047/PALABRAS_SOBRAN_REMIX_qwe1hn.mp4" },
            { title: "WYA REMIX BLACK AND YELLOW", artist: "J ABDIEL, BLESSD, ANUEL AA, IZAAK y PIRLO", cover: "covers/WYA REMIX BLACK AND YELLOW.jpg", file: "songs/WYA REMIX BLACK AND YELLOW.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1774051011/WYA_REMIX_BLACK_AND_YELLOW_rx98fb.mp4" }
        ];

        let cur = 0, playing = false, shuf = false, crossing = false, activeA = 1, lyrics = [], lyrI = -1, audioCtx, analyser, dataA;
        const $ = s => document.querySelector(s), a1 = new Audio(), a2 = new Audio();
        [a1, a2].forEach(a => { a.crossOrigin = "anonymous"; a.ontimeupdate = (e) => handleTime(e); });

        const initAudio = () => {
            if (audioCtx) return; audioCtx = new AudioContext();
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 64; dataA = new Uint8Array(analyser.frequencyBinCount);
            [a1, a2].forEach(a => audioCtx.createMediaElementSource(a).connect(analyser));
            analyser.connect(audioCtx.destination); loop();
        };

        const loop = () => {
            analyser.getByteFrequencyData(dataA);
            document.documentElement.style.setProperty('--beat', 1 + (dataA[1]/255 * 0.06));
            requestAnimationFrame(loop);
        };

        const load = (idx, man = true) => {
            crossing = false; $('#mix').classList.remove('active');
            let nA = activeA === 1 ? a2 : a1, cA = activeA === 1 ? a1 : a2, t = playlist[idx];
            cur = idx; nA.src = t.file; 
            if(man) { cA.pause(); cA.volume = 0; nA.volume = 1; if(playing) nA.play(); activeA = activeA === 1 ? 2 : 1; }
            ui(t);
        };

        const ui = (t) => {
            $('#title').innerText = t.title; $('#artist').innerText = t.artist; $('#cover').src = t.cover;
            const vA = activeA === 1 ? $('#v1') : $('#v2'), vB = activeA === 1 ? $('#v2') : $('#v1');
            if(t.video) { vA.src = t.video; vA.classList.add('active'); vB.classList.remove('active'); vA.play(); }
            else { $('.video-bg').forEach(v => v.classList.remove('active')); }
            color(t.cover); fetchLyr(t, activeA === 1 ? a1 : a2);
        };

        const color = (src) => {
            const img = new Image(); img.crossOrigin = "Anonymous"; img.src = src;
            img.onload = () => {
                const cvs = document.createElement('canvas'), ctx = cvs.getContext('2d'); cvs.width = cvs.height = 1;
                ctx.drawImage(img, 0,0,1,1); const d = ctx.getImageData(0,0,1,1).data;
                const rgb = `rgb(${d[0]},${d[1]},${d[2]})`;
                document.documentElement.style.setProperty('--accent-color', rgb);
            };
        };

        const fetchLyr = async (t, aud) => {
            lyrics = []; $('#lyr-c').innerHTML = '';
            try {
                const res = await fetch(`https://lrclib.net/api/get?artist_name=${encodeURIComponent(t.artist.split(',')[0])}&track_name=${encodeURIComponent(t.title)}&duration=${Math.round(aud.duration || 180)}`);
                const data = await res.json();
                if(data.syncedLyrics) {
                    lyrics = data.syncedLyrics.split('\n').map(l => {
                        const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                        return m ? { t: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3] } : null;
                    }).filter(Boolean);
                    $('#lyr-c').innerHTML = lyrics.map((l, i) => `<div class="l-line" id="l-${i}" onclick="seek(${l.t})">${l.text}</div>`).join('');
                }
            } catch(e) {}
        };

        window.seek = (t) => { (activeA === 1 ? a1 : a2).currentTime = t; };

        const handleTime = (e) => {
            let a = activeA === 1 ? a1 : a2; if (e.target !== a) return;
            if (!crossing && a.duration && (a.duration - a.currentTime <= 12)) {
                crossing = true; $('#mix').classList.add('active');
                let nIdx = shuf ? Math.floor(Math.random()*playlist.length) : (cur+1)%playlist.length;
                load(nIdx, false);
                let nA = activeA === 1 ? a2 : a1; nA.volume = 0; nA.play();
                let f = setInterval(() => {
                    a.volume = Math.max(0, a.volume - 0.1); nA.volume = Math.min(1, nA.volume + 0.1);
                    if(nA.volume >= 1) { clearInterval(f); a.pause(); activeA = activeA === 1 ? 2 : 1; crossing = false; $('#mix').classList.remove('active'); }
                }, 150);
            }
            const p = (a.currentTime / a.duration) * 100;
            $('#prog').value = p; $('#prog').style.setProperty('--p', `${p}%`);
            $('#cur').innerText = fmt(a.currentTime); $('#tot').innerText = fmt(a.duration);
            
            let idx = lyrics.findIndex((l, i) => a.currentTime >= l.t && (!lyrics[i+1] || a.currentTime < lyrics[i+1].t));
            if (idx !== -1 && idx !== lyrI) {
                lyrI = idx; document.querySelectorAll('.l-line').forEach((el, i) => el.className = `l-line ${i===idx?'active':''}`);
                const el = $(`#l-${idx}`); if(el) $('#lyr-c').scrollTo({ top: el.offsetTop - 150, behavior: 'smooth' });
            }
        };

        const fmt = s => `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;

        $('#play').onclick = () => {
            initAudio(); playing = !playing;
            const a = activeA === 1 ? a1 : a2; const v = activeA === 1 ? $('#v1') : $('#v2');
            playing ? (a.play(), v.play(), $('body').classList.remove('player-paused')) : (a.pause(), v.pause(), $('body').classList.add('player-paused'));
            $('#i-p').style.display = playing ? 'none' : 'block'; $('#i-s').style.display = playing ? 'block' : 'none';
        };

        $('#next').onclick = () => load(shuf ? Math.floor(Math.random()*playlist.length) : (cur+1)%playlist.length);
        $('#prev').onclick = () => load((cur-1+playlist.length)%playlist.length);
        $('#shuf').onclick = function() { shuf = !shuf; this.classList.toggle('active'); };
        $('#btn-l').onclick = () => $('#lyr-ov').classList.toggle('show');
        $('#prog').oninput = e => { (activeA === 1 ? a1 : a2).currentTime = (e.target.value/100)*(activeA === 1 ? a1 : a2).duration; };
        
        load(0);
    </script>
</body>
</html>
