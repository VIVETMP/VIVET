<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Ultra Premium Player</title>
    <link rel="icon" type="image/png" href="covers/LOGO.png">
    
    <style>
        :root {
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
            --spring-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh; width: 100vw;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- FONDOS DINÁMICOS --- */
        .video-background, .image-fallback {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            object-fit: cover; z-index: 1; opacity: 0; 
            transition: opacity 1.2s ease-in-out, transform 0.8s ease-out;
            filter: brightness(0.5) saturate(1.2);
        }
        .video-background.active, .image-fallback.active { opacity: 1; z-index: 2; }
        
        /* Animación sutil de respiración al fondo */
        body:not(.player-paused) .video-background.active {
            animation: bgPulse 10s infinite alternate ease-in-out;
        }
        @keyframes bgPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .overlay { 
            position: absolute; inset: 0; 
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.8) 100%); 
            z-index: 3; 
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .player-app {
            position: relative; z-index: 10;
            width: 100%; max-width: 400px; height: 90vh;
            padding: 20px; display: flex; flex-direction: column;
            justify-content: space-between;
            perspective: 1000px;
        }

        /* --- HEADER --- */
        .header { 
            display: flex; justify-content: center; align-items: center; gap: 10px;
            font-size: 12px; font-weight: 800; letter-spacing: 4px; color: var(--accent-color); 
            text-transform: uppercase; margin-bottom: 20px; position: relative;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .site-logo {
            width: 28px; height: 28px;
            background-color: var(--accent-color);
            -webkit-mask: url('covers/LOGO.png') no-repeat center / contain;
            mask: url('covers/LOGO.png') no-repeat center / contain;
            transition: transform 0.3s var(--spring-easing);
        }
        .header:hover .site-logo { transform: rotate(180deg) scale(1.1); }
        
        /* --- PORTADA CON EFECTO 3D --- */
        #artwork-wrapper { 
            position: relative; 
            margin: 20px 0;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
        }
        
        .artwork-container {
            width: 100%; aspect-ratio: 1; border-radius: 20px; overflow: hidden;
            position: relative; z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,0,0,0.3);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease;
        }
        
        .artwork-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1.2s ease;
        }

        .player-paused .artwork-container { transform: scale(0.85) rotateX(-5deg); opacity: 0.8; }

        /* --- LYRICS ULTRA MEJORADOS --- */
        .lyrics-overlay {
            position: absolute; inset: 0; z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(40px) saturate(1.8) brightness(0.6);
            -webkit-backdrop-filter: blur(40px) saturate(1.8) brightness(0.6);
            border-radius: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            opacity: 0; transform: translateY(20px) scale(0.95); pointer-events: none; 
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .lyrics-overlay.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        
        .lyrics-content {
            width: 100%; height: 100%; overflow-y: auto;
            padding: 80% 30px; scroll-behavior: smooth;
            scrollbar-width: none;
            -webkit-mask-image: linear-gradient(to bottom, transparent 5%, black 40%, black 60%, transparent 95%);
        }
        .lyrics-content::-webkit-scrollbar { display: none; } 

        .lyric-line {
            font-size: 24px; font-weight: 700; line-height: 1.2;
            color: rgba(255, 255, 255, 0.2);
            margin: 28px 0; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            filter: blur(2px); transform: translateX(-10px);
        }
        .lyric-line.active {
            color: #ffffff; filter: blur(0); transform: translateX(0) scale(1.05);
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .lyric-line.passed { color: rgba(255, 255, 255, 0.4); filter: blur(1px); transform: translateX(0) scale(0.95); }

        /* --- TRACK INFO --- */
        .track-info { display: flex; align-items: center; margin-bottom: 25px; }
        .track-title { 
            font-size: 24px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--text-sub));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .track-artist { font-size: 16px; font-weight: 500; color: var(--text-sub); }

        /* --- PROGRESS BAR PREMIUM --- */
        .progress-area { margin-bottom: 30px; position: relative; }
        .progress-bar {
            -webkit-appearance: none; width: 100%; height: 4px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.1); outline: none; cursor: pointer;
            background-image: linear-gradient(var(--accent-color), var(--accent-color));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
            transition: height 0.3s var(--spring-easing);
        }
        .progress-area:hover .progress-bar { height: 8px; }
        
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: #fff; border-radius: 50%; opacity: 0;
            transition: all 0.2s ease; box-shadow: 0 0 15px var(--accent-color);
        }
        .progress-area:hover .progress-bar::-webkit-slider-thumb { opacity: 1; transform: scale(1.2); }

        /* --- CONTROLES --- */
        .controls { display: flex; align-items: center; justify-content: space-between; }
        
        .btn { 
            background: none; border: none; cursor: pointer; color: var(--accent-color); 
            transition: all 0.3s var(--spring-easing);
            display: flex; align-items: center; justify-content: center;
        }
        .btn:hover { transform: scale(1.2); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .btn:active { transform: scale(0.9); }
        
        .btn-play {
            width: 70px; height: 70px; border-radius: 50%;
            background-color: var(--accent-color); color: #000;
            box-shadow: 0 15px 35px var(--accent-glow);
        }
        .btn-play svg { width: 32px; height: 32px; fill: #000; }

        .btn-secondary { color: var(--text-sub); }
        .btn-secondary.active { color: var(--accent-color); filter: drop-shadow(0 0 5px var(--accent-color)); }

        /* Animación para el badge de MIXING */
        .mixing-badge {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 9px; padding: 4px 10px; border-radius: 20px;
            background: var(--accent-color); color: #000; font-weight: 900;
            opacity: 0; transition: 0.4s;
        }
        .mixing-badge.active { opacity: 1; top: -45px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-5px); } }

    </style>
</head>
<body class="player-paused">

    <img id="fallback-bg" class="image-fallback" src="" alt="Fondo">
    <video id="vid1" class="video-background active" crossorigin="anonymous" muted playsinline loop></video>
    <video id="vid2" class="video-background" crossorigin="anonymous" muted playsinline loop></video>
    <div class="overlay"></div>

    <div class="player-app">
        <div class="header">
            <div class="mixing-badge" id="mixing-badge">LIVE MIXING</div>
            <div class="site-logo"></div>
            <span>VIVET</span>
        </div>
        
        <div id="artwork-wrapper">
            <div class="artwork-container" id="main-card">
                <img id="cover" src="" alt="Portada" crossorigin="anonymous">
                <div id="lyrics-overlay" class="lyrics-overlay">
                    <div id="lyrics-content" class="lyrics-content"></div>
                </div>
            </div>
        </div>

        <div class="player-footer">
            <div class="track-info">
                <div style="flex: 1">
                    <div class="track-title" id="title">Cargando...</div>
                    <div class="track-artist" id="artist">VIVET Music</div>
                </div>
                <button class="btn btn-secondary" id="btn-lyrics">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><path d="M13 8H7"></path><path d="M17 12H7"></path></svg>
                </button>
            </div>

            <div class="progress-area">
                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 11px; font-weight: 600; color: var(--text-sub);">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuffle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
                <button class="btn" id="btn-prev"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg></button>
                
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                </button>

                <button class="btn" id="btn-next"><svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg></button>
                <button class="btn btn-secondary" id="btn-repeat"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg></button>
            </div>
        </div>
    </div>

    <script>
        // Configuración de la Playlist (Misma data anterior)
        const playlist = [
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772525/WOH_OH_OH_dgjixz.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772039/444_r0lopi.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773772748/FOREVEL_TU_GANTEL_sgatna.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773773312/YO_QUIERO_jqrgmo.mp4" },
            { title: "DEJA VU", artist: "HADES66 y ROA", cover: "covers/DEJA VU.jpg", file: "songs/DEJA VU.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773712366/DEJA_VU_ymnvuw.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, ROA, MORA, ELADIO CARRION y CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "" },
            { title: "NEVER 2 LATE", artist: "ROA y YAN BLOCK", cover: "covers/NEVER 2 LATE.jpg", file: "songs/NEVER 2 LATE.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773854580/NEVER_2_LATE_xrfaj2.mp4" },
            { title: "PPC", artist: "ROA y HADES66", cover: "covers/PPC.jpg", file: "songs/PPC.mp3", video: "https://res.cloudinary.com/dwfqrnnnm/video/upload/v1773938740/PPC_zgzvc8.mp4" },
            { title: "TATE QUIETA", artist: "ROA y CDOBLETA", cover: "covers/TATE QUIETA.jpg", file: "songs/TATE QUIETA.mp3", video: "" }
        ];

        let currentIdx = 0;
        let isPlaying = false;
        let isDragging = false;
        let activeLayer = 1;
        let currentLyrics = [];
        let activeLyricIndex = -1;

        const a1 = new Audio(), a2 = new Audio();
        const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
        const playBtn = document.getElementById('btn-play');
        const progressBar = document.getElementById('progress');

        // --- EFECTO 3D PARALLAX EN PORTADA ---
        const card = document.getElementById('main-card');
        const wrapper = document.getElementById('artwork-wrapper');

        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth < 768) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            wrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset portada
        document.addEventListener('mouseleave', () => {
            wrapper.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- MANEJO DE LYRICS ---
        async function loadLyrics(track) {
            const content = document.getElementById('lyrics-content');
            content.innerHTML = '<div class="lyric-line" style="opacity:0.5">Buscando letra...</div>';
            currentLyrics = [];
            activeLyricIndex = -1;

            try {
                const query = encodeURIComponent(`${track.title} ${track.artist.split(',')[0]}`);
                const res = await fetch(`https://lrclib.net/api/search?q=${query}`);
                const data = await res.json();
                const match = data.find(item => item.syncedLyrics) || data[0];

                if (match && match.syncedLyrics) {
                    currentLyrics = parseLRC(match.syncedLyrics);
                    renderLyrics();
                } else {
                    content.innerHTML = '<div class="lyric-line" style="opacity:0.3">Letra no disponible</div>';
                }
            } catch (e) {
                content.innerHTML = '<div class="lyric-line" style="opacity:0.3">Letra no disponible</div>';
            }
        }

        function parseLRC(lrc) {
            const lines = lrc.split('\n');
            return lines.map(line => {
                const match = line.match(/^\[(\d{2}):(\d{2}(?:\.\d+)?)\](.*)/);
                if (match) {
                    return { time: parseInt(match[1]) * 60 + parseFloat(match[2]), text: match[3].trim() || "•••" };
                }
                return null;
            }).filter(l => l);
        }

        function renderLyrics() {
            const content = document.getElementById('lyrics-content');
            content.innerHTML = currentLyrics.map((l, i) => `<div class="lyric-line" id="lyric-${i}">${l.text}</div>`).join('');
        }

        function updateLyricsScroll(currentTime) {
            const index = currentLyrics.findIndex((l, i) => currentTime >= l.time && (!currentLyrics[i+1] || currentTime < currentLyrics[i+1].time));
            
            if (index !== -1 && index !== activeLyricIndex) {
                activeLyricIndex = index;
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach((line, i) => {
                    line.classList.remove('active', 'passed');
                    if (i === index) line.classList.add('active');
                    else if (i < index) line.classList.add('passed');
                });

                const activeEl = document.getElementById(`lyric-${index}`);
                if (activeEl) {
                    const offset = activeEl.offsetTop - (document.getElementById('lyrics-overlay').clientHeight / 2);
                    document.getElementById('lyrics-content').scrollTo({ top: offset, behavior: 'smooth' });
                }
            }
        }

        // --- LÓGICA DE REPRODUCCIÓN ---
        function playTrack(idx) {
            currentIdx = idx;
            const track = playlist[idx];
            const nextAudio = activeLayer === 1 ? a1 : a2;
            const nextVid = activeLayer === 1 ? v1 : v2;
            const prevVid = activeLayer === 1 ? v2 : v1;

            nextAudio.src = track.file;
            if (track.video) {
                nextVid.src = track.video;
                nextVid.classList.add('active');
                prevVid.classList.remove('active');
            } else {
                nextVid.classList.remove('active');
                document.getElementById('fallback-bg').src = track.cover;
                document.getElementById('fallback-bg').classList.add('active');
            }

            document.getElementById('title').textContent = track.title;
            document.getElementById('artist').textContent = track.artist;
            document.getElementById('cover').src = track.cover;
            
            if (isPlaying) nextAudio.play();
            loadLyrics(track);
            extractColor(track.cover);
        }

        function togglePlay() {
            const audio = activeLayer === 1 ? a1 : a2;
            const vid = activeLayer === 1 ? v1 : v2;
            if (isPlaying) {
                audio.pause(); if(vid.src) vid.pause();
                playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg>';
                document.body.classList.add('player-paused');
            } else {
                audio.play(); if(vid.src) vid.play();
                playBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
                document.body.classList.remove('player-paused');
            }
            isPlaying = !isPlaying;
        }

        // Color extractor & UI update
        function extractColor(src) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1);
                const [r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                const color = `rgb(${r},${g},${b})`;
                document.documentElement.style.setProperty('--accent-color', color);
                document.documentElement.style.setProperty('--accent-glow', `rgba(${r},${g},${b}, 0.4)`);
            };
            img.src = src;
        }

        // Listeners
        playBtn.addEventListener('click', togglePlay);
        document.getElementById('btn-next').addEventListener('click', () => playTrack((currentIdx + 1) % playlist.length));
        document.getElementById('btn-prev').addEventListener('click', () => playTrack((currentIdx - 1 + playlist.length) % playlist.length));
        
        document.getElementById('btn-lyrics').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('lyrics-overlay').classList.toggle('show');
        });

        // Loop visual
        function updateLoop() {
            const audio = activeLayer === 1 ? a1 : a2;
            if (!audio.paused && !isDragging) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressBar.value = pct;
                progressBar.style.setProperty('--progress', `${pct}%`);
                document.getElementById('time-current').textContent = formatTime(audio.currentTime);
                document.getElementById('time-total').textContent = formatTime(audio.duration);
                updateLyricsScroll(audio.currentTime);
            }
            requestAnimationFrame(updateLoop);
        }

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Init
        playTrack(0);
        updateLoop();

    </script>
</body>
</html>
